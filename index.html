<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rathe | rate then hate</title>
    <style>
        :root { --red: #ff3b30; --bg: #000; --panel: #0a0a0a; }
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; touch-action: none; /* Prevents accidental zooming/scrolling */
        }

        .app-wrapper { display: flex; height: 100vh; width: 100vw; }

        /* VIDEO SIDE */
        .video-side {
            flex: 1.2; display: flex; flex-direction: column;
            background: #000; border-right: 1px solid #222;
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translateX(-100%);
        }
        .video-side.active { transform: translateX(0); }
        .user-slot { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; border-bottom: 1px solid #111; }
        .camera-placeholder { width: 100px; height: 100px; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .q-mark { font-size: 50px; font-weight: 800; }

        /* CONTROL SIDE */
        .control-side { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--panel); }
        .container { text-align: center; padding: 20px; width: 80%; }
        
        h1 { font-weight: 900; font-size: 2.8rem; margin: 0; letter-spacing: -2px; }
        .tagline { color: #666; margin-bottom: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* BUTTONS */
        .main-btn { 
            background: #fff; color: #000; border: none; padding: 20px; 
            font-size: 1rem; font-weight: 800; border-radius: 12px; width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        #cancelBtn { background: #222; color: #fff; margin-top: 15px; display: none; }

        /* THE FIX: FIXED POSITION SKIP BUTTON */
        #skipBtn { 
            display: none;
            position: fixed;
            bottom: 40px; 
            right: 5%;
            width: 90%; /* Almost full width on mobile for easy thumb access */
            max-width: 340px;
            background: var(--red); 
            color: white; 
            padding: 22px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 16px;
            border: none;
            z-index: 99999; /* Higher than all other layers */
            box-shadow: 0 10px 40px rgba(255, 59, 48, 0.4);
            text-transform: uppercase;
        }

        #timer { font-family: monospace; font-size: 1.5rem; color: var(--red); margin-bottom: 10px; display: none; }

        /* RATING OVERLAY */
        #rating-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100000; padding: 20px; 
        }
        .rate-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; margin-top: 20px; }
        .rate-btn { padding: 15px; background: #111; color: #fff; border: 1px solid #333; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="video-side" id="videoSide">
            <div class="user-slot"><div class="camera-placeholder"><span class="q-mark">?</span></div></div>
            <div class="user-slot"><div class="camera-placeholder"><span class="q-mark">?</span></div></div>
        </div>
        
        <div class="control-side">
            <div class="container">
                <div id="timer">02:00</div>
                <h1>Rathe</h1>
                <p class="tagline">rate then hate.</p>
                <button id="startBtn" class="main-btn">START MATCHING</button>
                <button id="cancelBtn" class="main-btn">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- The Skip Button is outside the flex wrapper -->
    <button id="skipBtn">SKIP / HATE</button>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <div id="rating-screen">
        <h1 style="font-size: 2rem;">RATE THEM</h1>
        <div class="rate-grid" id="rateGrid"></div>
    </div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
    databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
    projectId: "rate-then-hate-backend",
    appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const peer = new Peer();

const startBtn = document.getElementById('startBtn');
const cancelBtn = document.getElementById('cancelBtn');
const skipBtn = document.getElementById('skipBtn');
const videoSide = document.getElementById('videoSide');
const remoteAudio = document.getElementById('remoteAudio');
const timerDisplay = document.getElementById('timer');

let localStream, myId, myEntry, timerInterval, currentCall;
let isConnected = false;

peer.on('open', (id) => { myId = id; });

// Unified Reset Function
function terminateAndRefresh() {
    console.log("Terminating session...");
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (currentCall) currentCall.close();
    if (myEntry) myEntry.remove();
    
    // Use replace to prevent back-button loops on mobile
    const url = window.location.origin + window.location.pathname + "?v=" + Date.now();
    window.location.replace(url);
}

// THE MOBILE FIX: Use pointerdown for instant response
skipBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    terminateAndRefresh();
});

// START
startBtn.onclick = async () => {
    // Unlock mobile audio
    remoteAudio.play().catch(() => {}); remoteAudio.pause();
    
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startBtn.disabled = true;
        startBtn.innerText = "SEARCHING...";
        cancelBtn.style.display = "block";

        db.ref('lobby').once('value', (snap) => {
            const users = snap.val();
            if (users) {
                const partnerId = users[Object.keys(users)[0]];
                db.ref('lobby/' + Object.keys(users)[0]).remove();
                currentCall = peer.call(partnerId, localStream);
                currentCall.on('stream', (rem) => { if(!isConnected) setupCall(rem); });
            } else {
                myEntry = db.ref('lobby').push(myId);
                cancelBtn.onclick = () => terminateAndRefresh();
            }
        });
    } catch(e) { alert("Mic required for matching."); }
};

// RECEIVER
peer.on('call', (call) => {
    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
        localStream = stream;
        currentCall = call;
        call.answer(stream);
        call.on('stream', (rem) => { if(!isConnected) setupCall(rem); });
    });
});

function setupCall(stream) {
    isConnected = true;
    remoteAudio.srcObject = stream;
    remoteAudio.play();
    
    videoSide.classList.add('active');
    startBtn.style.display = "none";
    cancelBtn.style.display = "none";
    skipBtn.style.display = "block";
    timerDisplay.style.display = "block";
    
    let time = 120;
    timerInterval = setInterval(() => {
        let m = Math.floor(time/60), s = time%60;
        timerDisplay.innerText = `${m}:${s<10?'0':''}${s}`;
        if(--time < 0) { clearInterval(timerInterval); launchRating(); }
    }, 1000);
}

function launchRating() {
    skipBtn.style.display = "none";
    document.getElementById('rating-screen').style.display = 'flex';
    const grid = document.getElementById('rateGrid');
    for(let i=1; i<=10; i++) {
        const b = document.createElement('button');
        b.className = 'rate-btn'; b.innerText = i;
        b.onclick = () => terminateAndRefresh();
        grid.appendChild(b);
    }
}

// Cleanup
window.onbeforeunload = () => { if(myEntry) myEntry.remove(); };
</script>
</body>
</html>
