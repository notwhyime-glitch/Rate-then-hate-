<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rathe | rate then hate</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #000; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .app-wrapper { display: flex; height: 100vh; width: 100vw; }

        /* --- LEFT SIDE: VIEWPORTS --- */
        .video-side {
            flex: 1.5; display: flex; flex-direction: column;
            background: #000; border-right: 1px solid #222;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-100%); opacity: 0;
        }
        .video-side.active { transform: translateX(0); opacity: 1; }
        .user-slot { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #111; background: #050505; }
        .camera-placeholder { width: 160px; height: 160px; background: #000; border: 3px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .q-mark { font-size: 90px; font-weight: 800; color: #fff; user-select: none; }
        .label { margin-top: 15px; color: #444; text-transform: uppercase; font-size: 12px; letter-spacing: 4px; }

        /* --- RIGHT SIDE: CONTROLS --- */
        .control-side { flex: 1; display: flex; justify-content: center; align-items: center; background: #0a0a0a; z-index: 10; }
        .container { text-align: center; padding: 40px; width: 100%; max-width: 350px; }
        
        #timer { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.8rem; color: #ff3b30; margin-bottom: 10px; font-weight: bold;
            display: none; 
        }

        h1 { font-weight: 900; font-size: 3.8rem; margin: 0; letter-spacing: -3px; line-height: 1; }
        .tagline { color: #666; margin-bottom: 40px; font-size: 1.1rem; letter-spacing: 1px; }
        #statusDesc { color: #a1a1a1; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.6; }

        button {
            background-color: #fff; color: #000; border: none; padding: 20px;
            font-size: 1.1rem; font-weight: 700; border-radius: 14px; cursor: pointer; width: 100%;
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.96); }

        #cancelBtn { background-color: #222; color: white; margin-top: 15px; display: none; }
        #skipBtn { background-color: #ff3b30; color: white; margin-top: 20px; display: none; }

        /* --- RATING MODAL --- */
        #rating-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .rating-box { width: 90%; max-width: 450px; text-align: center; }
        .rating-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .rate-btn { padding: 15px; background: #111; color: white; border: 1px solid #333; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .rate-btn:hover { background: #fff; color: #000; }
        .category-label { margin-top: 25px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; }
        .hate { color: #ff3b30; } .rate { color: #ffcc00; } .like { color: #4cd964; }

        .searching { background-color: #fff !important; color: #000 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); } 70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); } }
    </style>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <div class="video-side" id="videoSide">
            <div class="user-slot"><div class="camera-placeholder"><span class="q-mark">?</span></div><div class="label">Stranger</div></div>
            <div class="user-slot"><div class="camera-placeholder"><span class="q-mark">?</span></div><div class="label">You</div></div>
        </div>

        <div class="control-side">
            <div class="container">
                <div id="timer">02:00</div>
                <h1>Rathe</h1>
                <p class="tagline">rate then hate.</p>
                <p id="statusDesc">Connect instantly with a stranger. <br>Speak first, reveal later.</p>
                <button id="startBtn">Start Matching</button>
                <button id="cancelBtn">Cancel Search</button>
                <button id="skipBtn">Skip / Hate</button>
            </div>
        </div>
    </div>

    <div id="rating-screen">
        <div class="rating-box">
            <h1 style="font-size: 3rem;">Time's Up.</h1>
            <p style="color: #666; margin-bottom: 30px;">What is their fate?</p>
            <div class="category-label hate">1 - 4 : Hate Them</div>
            <div class="rating-options" id="hate-group"></div>
            <div class="category-label rate">5 - 6 : Rate Them</div>
            <div class="rating-options" id="rate-group"></div>
            <div class="category-label like">7 - 10 : Like Them</div>
            <div class="rating-options" id="like-group"></div>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
  projectId: "rate-then-hate-backend",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const peer = new Peer();

const startBtn = document.getElementById('startBtn');
const cancelBtn = document.getElementById('cancelBtn');
const skipBtn = document.getElementById('skipBtn');
const timerDisplay = document.getElementById('timer');
const videoSide = document.getElementById('videoSide');
const statusDesc = document.getElementById('statusDesc');

let localStream, myId, myEntry, timerInterval;

peer.on('open', (id) => { myId = id; });

// RECEIVER
peer.on('call', (call) => {
    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
        localStream = stream;
        call.answer(stream); 
        call.on('stream', (remoteStream) => { 
            playStream(remoteStream); 
            showCallUI(); // Trigger only on active audio stream
        });
    });
});

// CALLER
startBtn.addEventListener('click', async () => {
    if (!myId) return alert("Initializing...");
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startBtn.innerText = "Searching...";
        startBtn.classList.add('searching');
        cancelBtn.style.display = "block";

        db.ref('lobby').once('value', (snapshot) => {
            const users = snapshot.val();
            if (users) {
                const keys = Object.keys(users);
                const partnerId = users[keys[0]];
                db.ref('lobby/' + keys[0]).remove();
                const call = peer.call(partnerId, localStream);
                call.on('stream', (remoteStream) => { 
                    playStream(remoteStream); 
                    showCallUI(); // Trigger only on active audio stream
                });
            } else {
                myEntry = db.ref('lobby').push(myId);
                cancelBtn.onclick = () => { if(myEntry) myEntry.remove(); location.reload(); };
            }
        });
    } catch (err) { alert("Mic access required."); }
});

function showCallUI() {
    if (videoSide.classList.contains('active')) return; // Avoid double start
    
    videoSide.classList.add('active');
    startBtn.style.display = "none";
    cancelBtn.style.display = "none";
    skipBtn.style.display = "block";
    timerDisplay.style.display = "block";
    
    statusDesc.innerHTML = "<b>Connected.</b><br>Decide their fate.";
    startTimer(120); 
    
    skipBtn.onclick = () => location.reload();
}

function startTimer(seconds) {
    let time = seconds;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        let mins = Math.floor(time / 60);
        let secs = time % 60;
        timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (--time < 0) {
            clearInterval(timerInterval);
            showRatingScreen();
        }
    }, 1000);
}

function showRatingScreen() {
    document.getElementById('rating-screen').style.display = 'flex';
    setupRatingButtons();
}

function setupRatingButtons() {
    const groups = { 'hate-group': [1,2,3,4], 'rate-group': [5,6], 'like-group': [7,8,9,10] };
    Object.keys(groups).forEach(groupId => {
        const container = document.getElementById(groupId);
        container.innerHTML = '';
        groups[groupId].forEach(num => {
            const b = document.createElement('button');
            b.className = 'rate-btn';
            b.innerText = num;
            b.onclick = () => { alert(`You rated: ${num}`); location.reload(); };
            container.appendChild(b);
        });
    });
}

function playStream(stream) {
    const audio = new Audio();
    audio.srcObject = stream; audio.autoplay = true;
    document.body.appendChild(audio);
    audio.play().catch(() => window.addEventListener('click', () => audio.play(), { once: true }));
}
</script>
</body>
</html>
