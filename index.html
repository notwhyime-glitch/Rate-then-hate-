<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>

<style>
:root { --red:#ff3b30; --bg:#000; --panel:#0a0a0a; --green:#19ff6a; }

body,html{
margin:0;padding:0;height:100dvh;width:100vw;
background:var(--bg);color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
overflow:hidden;
}

.app-wrapper{display:flex;height:100dvh;width:100vw;}

.video-side{
width:0;
flex:0;
display:flex;
flex-direction:column;
background:#000;
opacity:0;
transition:.5s;
overflow:hidden;
}

.video-side.active{
width:60vw;
flex:1.5;
opacity:1;
border-right:1px solid #222;
}

.user-slot{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
position:relative;
overflow:hidden;
}

/* FULL RECTANGLE VIDEO */
.user-slot video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:2;
}

.camera-placeholder{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:3;
transition:opacity .25s ease;
font-size:50px;
font-weight:800;
}

.user-slot.revealed .camera-placeholder{
opacity:0;
pointer-events:none;
}

.control-side{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:var(--panel);
}

.container{text-align:center;width:85%;max-width:400px;}

h1{font-size:4rem;margin:0;}

.tagline{color:#666;margin-bottom:40px;}

.main-btn{
background:#fff;
color:#000;
padding:20px;
border:none;
border-radius:16px;
width:100%;
font-weight:800;
cursor:pointer;
}

#startBtn.searching{
background:var(--green);
color:#000;
}

#skipBtn{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:340px;
background:var(--red);
color:#fff;
padding:20px;
border:none;
border-radius:18px;
font-weight:900;
}

#timer{
font-size:2rem;
color:var(--red);
display:none;
margin-bottom:20px;
}

#rating-screen{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

.rate-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
width:100%;
margin-top:20px;
}

.rate-btn{
padding:20px;
background:#111;
border:1px solid #333;
border-radius:10px;
color:#fff;
}

/* REVEAL COUNTDOWN */
#reveal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:#000;
color:var(--green);
font-size:6rem;
font-weight:900;
z-index:9999;
}
</style>
</head>

<body>

<div id="reveal">3</div>

<div class="app-wrapper">

<div class="video-side" id="videoSide">

<div class="user-slot">
<video id="remoteVideo" autoplay playsinline></video>
<div class="camera-placeholder">?</div>
</div>

<div class="user-slot">
<video id="localVideo" autoplay playsinline muted></video>
<div class="camera-placeholder">?</div>
</div>

</div>

<div class="control-side">
<div class="container">

<div id="timer">02:00</div>

<h1>Rathe</h1>
<p class="tagline">rate then hate.</p>

<button id="startBtn" class="main-btn">START MATCHING</button>

</div>
</div>

</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<div id="rating-screen">
<h1 id="ratingTitle">RATE THEM</h1>
<div id="rateGrid" class="rate-grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyC...",
databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
projectId: "rate-then-hate-backend",
appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const peer = new Peer();

let myId, localStream, partnerPeerId, currentMatchId;
let currentCall = null;

let phase = "idle";
let timerInterval = null;

let ratingTimer=null;
let ratingCountdown=10;
let ratingSelected=false;

/* ---------- STATE HELPERS ---------- */

function revealVideoSlots(){
document.querySelectorAll('.user-slot')
.forEach(s => s.classList.add('revealed'));
}

/* ---------- PEER ---------- */

peer.on('open',id=>myId=id);

/* ---------- START MATCH ---------- */

document.getElementById('startBtn').onclick=async()=>{

localStream=await navigator.mediaDevices.getUserMedia({audio:true});

db.ref('lobby').push(myId);

setInterval(()=>{

db.ref('lobby').once('value',snap=>{
const users=snap.val();
if(!users) return;

const key=Object.keys(users).find(k=>users[k]!==myId);
if(!key) return;

const pid=users[key];

db.ref('lobby/'+key).remove();

partnerPeerId=pid;
currentMatchId=[myId,pid].sort().join('_');

startCall(peer.call(pid,localStream));

});

},2000);

};

/* ---------- CALL ---------- */

peer.on('call',call=>{
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
localStream=stream;
partnerPeerId=call.peer;
currentMatchId=[myId,partnerPeerId].sort().join('_');

call.answer(stream);
startCall(call);
});
});

function startCall(call){

currentCall = call;

call.on('stream',s=>{
if(s.getVideoTracks().length){
document.getElementById('remoteVideo').srcObject=s;
}else{
startSession(s);
}
});

call.on('close',()=>location.reload());
call.on('error',()=>location.reload());

}

/* ---------- AUDIO PHASE ---------- */

function startSession(stream){

phase="session";

document.getElementById('remoteAudio').srcObject=stream;
document.getElementById('videoSide').classList.add('active');
document.getElementById('timer').style.display='block';

let end=Date.now()+120000;

function tick(){

let r=end-Date.now();
if(r<=0){
showRating();
return;
}

let t=Math.floor(r/1000);
document.getElementById('timer').innerText=
`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
}

tick();
timerInterval=setInterval(tick,250);

}

/* ---------- RATING ---------- */

function showRating(){

phase="rating";

document.getElementById('rating-screen').style.display='flex';

const grid=document.getElementById('rateGrid');
const title=document.getElementById('ratingTitle');

grid.innerHTML='';

ratingCountdown=10;
ratingSelected=false;

title.style.color="red";
title.innerText="RATE THEM (10)";

ratingTimer=setInterval(()=>{

if(ratingSelected) return;

ratingCountdown--;

if(ratingCountdown<=0){
finishRating(5);
return;
}

title.innerText=`RATE THEM (${ratingCountdown})`;

},1000);

for(let i=1;i<=10;i++){
const b=document.createElement('button');
b.className='rate-btn';
b.innerText=i;

b.onclick=()=>finishRating(i);

grid.appendChild(b);
}

}

/* ---------- FINISH RATING ---------- */

function finishRating(val){

if(phase!=="rating") return;

phase="reveal";

ratingSelected=true;
clearInterval(ratingTimer);

db.ref('matches/'+currentMatchId+'/'+myId).set(val);

document.getElementById('ratingTitle').innerText="PREPARING REVEAL...";
document.getElementById('rateGrid').style.display='none';

/* safety fallback */
setTimeout(()=>{
if(phase==="reveal"){
upgradeToVideo();
}
},6000);

startReveal(()=>{
upgradeToVideo();
});

}

/* ---------- REVEAL COUNTDOWN ---------- */

function startReveal(cb){

const el=document.getElementById('reveal');
let t=3;

el.style.display='flex';
el.innerText=t;

const iv=setInterval(()=>{

t--;

if(t<=0){
clearInterval(iv);
el.style.display='none';
cb();
return;
}

el.innerText=t;

},1000);

}

/* ---------- VIDEO UPGRADE ---------- */

async function upgradeToVideo(){

phase="video";

const stream = await navigator.mediaDevices.getUserMedia({
audio:true,
video:true
});

document.getElementById('localVideo').srcObject = stream;

/* FULL RECTANGLE REVEAL */
revealVideoSlots();

if(currentCall?.peerConnection){

const sender = currentCall.peerConnection
.getSenders?.()
.find(s => s.track && s.track.kind === "video");

if(sender){
sender.replaceTrack(stream.getVideoTracks()[0]);
}

}

}

document.getElementById('skipBtn').onclick=()=>location.reload();

</script>

</body>
</html>
