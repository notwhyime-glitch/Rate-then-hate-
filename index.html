<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --red: #ff2d20;
  --green: #00ff87;
  --bg: #050505;
  --panel: #0c0c0c;
  --border: #1a1a1a;
  --muted: #444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  height: 100dvh; width: 100vw;
  background: var(--bg); color: #fff;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9000; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.035;
}

/* ── LAYOUT ── */
.app-wrapper {
  display: flex; height: 100dvh; width: 100vw;
}

/* ── VIDEO SIDE ── */
.video-side {
  width: 0; flex: 0; display: flex; flex-direction: column;
  background: #000; opacity: 0;
  transition: width .6s cubic-bezier(.77,0,.18,1), opacity .6s ease, flex .6s cubic-bezier(.77,0,.18,1);
  overflow: hidden;
}

.video-side.active {
  width: 60vw; flex: 1.5; opacity: 1;
  border-right: 1px solid var(--border);
}

.user-slot {
  flex: 1; display: flex; justify-content: center; align-items: center;
  background: #060606; position: relative; overflow: hidden;
}

.user-slot + .user-slot {
  border-top: 1px solid var(--border);
}

.user-slot video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 2;
  opacity: 0; transition: opacity .4s ease;
}

.user-slot video.live { opacity: 1; }

.camera-placeholder {
  position: absolute; inset: 0;
  display: flex; justify-content: center; align-items: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px; color: #1a1a1a;
  z-index: 1; user-select: none;
  letter-spacing: 4px;
}

.slot-label {
  position: absolute; bottom: 12px; left: 16px;
  font-size: 10px; color: var(--muted); letter-spacing: 2px;
  text-transform: uppercase; z-index: 5;
}

/* ── CONTROL SIDE ── */
.control-side {
  flex: 1; display: flex; justify-content: center; align-items: center;
  background: var(--panel); position: relative;
}

.container {
  text-align: center; width: 85%; max-width: 380px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5.5rem; line-height: 1;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #fff 0%, #888 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.tagline {
  color: var(--muted); font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 48px;
}

/* ── TIMER ── */
#timer {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; color: var(--red);
  letter-spacing: 4px;
  display: none; margin-bottom: 24px;
  animation: pulse-red 1s ease-in-out infinite;
}

@keyframes pulse-red {
  0%, 100% { opacity: 1; }
  50% { opacity: .6; }
}

/* ── STATUS LINE ── */
#statusLine {
  font-size: 10px; letter-spacing: 2px; color: var(--muted);
  text-transform: uppercase; min-height: 16px;
  margin-bottom: 32px;
}

#statusLine.green { color: var(--green); }
#statusLine.red   { color: var(--red); }

/* ── BUTTONS ── */
.main-btn {
  background: #fff; color: #000;
  padding: 18px 24px;
  border: none; border-radius: 12px;
  width: 100%;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 3px;
  cursor: pointer;
  transition: transform .15s ease, background .2s ease;
  position: relative; overflow: hidden;
}

.main-btn:active { transform: scale(.97); }

.main-btn.searching {
  background: var(--green); color: #000;
  animation: searching-pulse 1.4s ease-in-out infinite;
}

@keyframes searching-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,135,.3); }
  50% { box-shadow: 0 0 0 14px rgba(0,255,135,0); }
}

/* ── DOTS LOADER ── */
.dots {
  display: inline-block;
}
.dots::after {
  content: '';
  animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}

/* ── SKIP BTN ── */
#skipBtn {
  display: none;
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  width: 90%; max-width: 340px;
  background: var(--red); color: #fff;
  padding: 18px; border: none; border-radius: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 3px;
  cursor: pointer; z-index: 9998;
  transition: transform .15s ease;
}

#skipBtn:active { transform: translateX(-50%) scale(.97); }

/* ── RATING SCREEN ── */
#rating-screen {
  position: fixed; inset: 0; background: rgba(0,0,0,.96);
  display: none; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 9997; padding: 32px;
  backdrop-filter: blur(12px);
}

#ratingTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem; letter-spacing: 5px;
  color: var(--red); margin-bottom: 8px;
}

#ratingSubtitle {
  font-size: 10px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 36px;
}

.rate-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px; width: 100%; max-width: 400px;
}

.rate-btn {
  padding: 20px 0;
  background: #111; border: 1px solid #222;
  border-radius: 10px; color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 1px;
  cursor: pointer;
  transition: background .15s ease, transform .1s ease, border-color .15s ease;
}

.rate-btn:hover {
  background: #222; border-color: #444;
  transform: translateY(-2px);
}

.rate-btn:active { transform: scale(.95); }

/* ── COUNTDOWN BAR ── */
#countdownBar {
  width: 100%; max-width: 400px;
  height: 3px; background: #1a1a1a;
  border-radius: 2px; margin-top: 28px; overflow: hidden;
}

#countdownFill {
  height: 100%; width: 100%;
  background: var(--red);
  transform-origin: left;
  transition: width 1s linear;
}

/* ── REVEAL OVERLAY ── */
#reveal {
  position: fixed; inset: 0;
  display: none; justify-content: center; align-items: center;
  flex-direction: column; gap: 16px;
  background: #000;
  z-index: 9999;
}

#revealNum {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12rem; line-height: 1;
  color: var(--green);
  animation: pop .3s ease;
}

#revealLabel {
  font-size: 11px; letter-spacing: 4px;
  color: var(--muted); text-transform: uppercase;
}

@keyframes pop {
  0% { transform: scale(1.4); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ── NOTIFICATION TOAST ── */
#toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #111; border: 1px solid #333;
  border-radius: 10px; padding: 12px 24px;
  font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: #fff;
  z-index: 99999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}

#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<!-- REVEAL COUNTDOWN -->
<div id="reveal" style="display:none;">
  <div id="revealNum">3</div>
  <div id="revealLabel">video in</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<div class="app-wrapper">

  <!-- VIDEO PANELS -->
  <div class="video-side" id="videoSide">
    <div class="user-slot">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="camera-placeholder">THEM</div>
      <div class="slot-label">remote</div>
    </div>
    <div class="user-slot">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="camera-placeholder">YOU</div>
      <div class="slot-label">you</div>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="control-side">
    <div class="container">
      <div id="timer">02:00</div>
      <div class="logo">Rathe</div>
      <p class="tagline">rate then hate.</p>
      <div id="statusLine">ready when you are</div>
      <button id="startBtn" class="main-btn">START MATCHING</button>
    </div>
  </div>

</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<!-- RATING SCREEN -->
<div id="rating-screen">
  <div id="ratingTitle">RATE THEM</div>
  <div id="ratingSubtitle">you have 10 seconds</div>
  <div class="rate-grid" id="rateGrid"></div>
  <div id="countdownBar"><div id="countdownFill"></div></div>
</div>

<!-- Firebase + PeerJS -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
/* ══════════════════════════════════════════
   CONFIG — swap in your real Firebase keys
══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  authDomain: "rate-then-hate-backend.firebaseapp.com",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com",
  projectId: "rate-then-hate-backend",
  storageBucket: "rate-then-hate-backend.firebasestorage.app",
  messagingSenderId: "195653571803",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const peer = new Peer();

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let myId          = null;
let myLobbyKey    = null;
let localStream   = null;
let videoStream   = null;
let partnerPeerId = null;
let currentMatchId = null;
let currentCall   = null;
let signalRef     = null;    // Firebase ref to listen for partner signals

let phase = "idle";          // idle | searching | connecting | session | rating | reveal | video

let searchInterval = null;
let sessionTimer   = null;
let ratingTimer    = null;

let ratingSelected = false;
let ratingFired    = false;

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const setStatus = (msg, cls='') => {
  const el = $('statusLine');
  el.className = cls;
  el.innerHTML = msg;
};

function showToast(msg, duration=3000){
  const t = $('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

/* ══════════════════════════════════════════
   PEER OPEN
══════════════════════════════════════════ */
peer.on('open', id => {
  myId = id;
  setStatus('ready when you are');
});

peer.on('error', err => {
  console.error('PeerJS error', err);
  showToast('connection error — retrying');
});

/* ══════════════════════════════════════════
   CLEAN UP TIMERS & LISTENERS
══════════════════════════════════════════ */
function clearTimers(){
  if(searchInterval){ clearInterval(searchInterval); searchInterval=null; }
  if(sessionTimer)  { clearInterval(sessionTimer);   sessionTimer=null;   }
  if(ratingTimer)   { clearInterval(ratingTimer);    ratingTimer=null;    }
}

function stopSignalListener(){
  if(signalRef){ signalRef.off(); signalRef=null; }
}

/* ══════════════════════════════════════════
   SIGNALING (skip / video-upgrade events)
   We write to matches/{matchId}/signals/{myId}
   and listen on matches/{matchId}/signals/{partnerId}
══════════════════════════════════════════ */
function listenForPartnerSignals(){
  if(!currentMatchId || !partnerPeerId) return;
  signalRef = db.ref(`matches/${currentMatchId}/signals/${partnerPeerId}`);
  signalRef.on('value', snap => {
    const val = snap.val();
    if(!val) return;

    if(val === 'skip'){
      showToast('they skipped you 💀');
      reset();
    }

    if(val === 'video-ready'){
      // Partner turned on their camera — show video side
      handleRemoteVideoReady();
    }
  });
}

function sendSignal(type){
  if(!currentMatchId || !myId) return;
  db.ref(`matches/${currentMatchId}/signals/${myId}`).set(type);
}

/* ══════════════════════════════════════════
   START MATCHING
══════════════════════════════════════════ */
$('startBtn').onclick = async () => {
  if(phase !== 'idle') return;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e){
    showToast('mic access needed!');
    return;
  }

  phase = 'searching';
  $('startBtn').classList.add('searching');
  $('startBtn').innerHTML = 'SEARCHING<span class="dots"></span>';
  setStatus('scanning the void', 'green');

  // Push self to lobby
  const ref = db.ref('lobby').push(myId);
  myLobbyKey = ref.key;

  searchInterval = setInterval(tryMatch, 2000);
};

/* ══════════════════════════════════════════
   MATCHMAKING (with Firebase transaction to fix race)
══════════════════════════════════════════ */
async function tryMatch(){
  if(phase !== 'searching') return;

  const snap = await db.ref('lobby').once('value');
  const users = snap.val();
  if(!users) return;

  for(let k of Object.keys(users)){
    const pid = users[k];
    if(!pid || pid === myId) continue;

    const matchId  = [myId, pid].sort().join('_');
    const matchRef = db.ref(`matches/${matchId}`);

    // Atomic transaction — only one side wins
    let won = false;
    await matchRef.transaction(current => {
      if(current !== null) return; // already claimed — abort
      won = true;
      return { a: myId, b: pid, status: 'locked', ts: Date.now() };
    });

    if(!won) continue;

    // Remove both from lobby
    db.ref(`lobby/${k}`).remove();
    if(myLobbyKey) db.ref(`lobby/${myLobbyKey}`).remove();

    partnerPeerId  = pid;
    currentMatchId = matchId;
    phase          = 'connecting';

    clearInterval(searchInterval); searchInterval = null;

    setStatus('matched — connecting', 'green');

    listenForPartnerSignals();
    initiateCall();
    return;
  }
}

/* ══════════════════════════════════════════
   INCOMING CALL (the non-initiator side)
══════════════════════════════════════════ */
peer.on('call', async call => {
  // Ignore stray calls if already in session
  if(phase === 'session' || phase === 'rating' || phase === 'video'){
    call.close(); return;
  }

  if(!localStream){
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e){
      call.close(); return;
    }
  }

  // Figure out who called us — derive matchId and partner
  // PeerJS call.peer is the remote peer ID
  partnerPeerId  = call.peer;
  currentMatchId = [myId, partnerPeerId].sort().join('_');
  phase          = 'connecting';

  // Remove self from lobby if still there
  if(myLobbyKey){
    db.ref(`lobby/${myLobbyKey}`).remove();
    myLobbyKey = null;
  }
  clearInterval(searchInterval); searchInterval = null;

  $('startBtn').classList.add('searching');
  setStatus('matched — connecting', 'green');

  call.answer(localStream);
  listenForPartnerSignals();
  handleCall(call);
});

/* ══════════════════════════════════════════
   INITIATE CALL (caller side)
══════════════════════════════════════════ */
function initiateCall(){
  const call = peer.call(partnerPeerId, localStream);
  handleCall(call);
}

/* ══════════════════════════════════════════
   HANDLE CALL EVENTS
══════════════════════════════════════════ */
function handleCall(call){
  currentCall = call;

  call.on('stream', remoteStream => {
    // If stream has video tracks → it's the post-rating video upgrade
    if(remoteStream.getVideoTracks().length > 0){
      $('remoteVideo').srcObject = remoteStream;
      $('remoteVideo').classList.add('live');
      $('videoSide').classList.add('active');
      return;
    }

    // Audio-only stream → start session
    if(phase === 'connecting'){
      $('remoteAudio').srcObject = remoteStream;
      startSession();
    }
  });

  call.on('close', () => { if(phase !== 'idle') reset(); });
  call.on('error', () => { if(phase !== 'idle') reset(); });
}

/* ══════════════════════════════════════════
   SESSION (2-min audio call)
══════════════════════════════════════════ */
function startSession(){
  phase = 'session';

  $('startBtn').classList.remove('searching');
  $('startBtn').style.display = 'none';
  $('timer').style.display    = 'block';
  $('skipBtn').style.display  = 'block';

  setStatus('audio call — live', 'green');

  let end = Date.now() + 120_000;

  function tick(){
    const remaining = end - Date.now();

    if(remaining <= 0){
      clearInterval(sessionTimer); sessionTimer = null;
      showRating();
      return;
    }

    const secs  = Math.floor(remaining / 1000);
    const mins  = Math.floor(secs / 60);
    const s     = secs % 60;
    $('timer').innerText = `${mins}:${String(s).padStart(2,'0')}`;
  }

  tick();
  sessionTimer = setInterval(tick, 250);
}

/* ══════════════════════════════════════════
   RATING SCREEN
══════════════════════════════════════════ */
function showRating(){
  if(ratingFired) return;
  ratingFired = true;
  phase = 'rating';

  $('skipBtn').style.display = 'none';
  $('timer').style.display   = 'none';

  const screen   = $('rating-screen');
  const grid     = $('rateGrid');
  const title    = $('ratingTitle');
  const fill     = $('countdownFill');

  screen.style.display = 'flex';
  grid.innerHTML = '';
  ratingSelected = false;

  // Build 1–10 buttons
  for(let i = 1; i <= 10; i++){
    const b = document.createElement('button');
    b.className  = 'rate-btn';
    b.innerText  = i;
    b.onclick    = () => finishRating(i);
    grid.appendChild(b);
  }

  // Countdown bar animation
  fill.style.width = '100%';
  setTimeout(() => { fill.style.width = '0%'; }, 50);

  let countdown = 10;
  title.innerText = `RATE THEM (${countdown})`;

  ratingTimer = setInterval(()=>{
    if(ratingSelected) return;
    countdown--;
    if(countdown <= 0){
      finishRating(5); // default mid rating on timeout
      return;
    }
    title.innerText = `RATE THEM (${countdown})`;
  }, 1000);
}

/* ══════════════════════════════════════════
   FINISH RATING → trigger reveal countdown
══════════════════════════════════════════ */
function finishRating(val){
  if(phase !== 'rating' || ratingSelected) return;
  ratingSelected = true;

  clearTimers();

  // Save rating to Firebase
  db.ref(`matches/${currentMatchId}/ratings/${myId}`).set(val);

  $('rating-screen').style.display = 'none';

  phase = 'reveal';
  startRevealCountdown();
}

/* ══════════════════════════════════════════
   REVEAL COUNTDOWN (3 → 2 → 1 → upgrade)
══════════════════════════════════════════ */
function startRevealCountdown(){
  const overlay  = $('reveal');
  const numEl    = $('revealNum');

  overlay.style.display = 'flex';
  let count = 3;
  numEl.innerText = count;

  setStatus('video reveal incoming', 'red');

  const tick = setInterval(()=>{
    count--;
    if(count <= 0){
      clearInterval(tick);
      overlay.style.display = 'none';
      upgradeToVideo();
      return;
    }
    numEl.innerText = count;
    // Retrigger pop animation
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = 'pop .3s ease';
  }, 1000);
}

/* ══════════════════════════════════════════
   VIDEO UPGRADE — proper WebRTC renegotiation
══════════════════════════════════════════ */
async function upgradeToVideo(){
  if(phase === 'video') return; // guard against double-call
  phase = 'video';

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
  } catch(e){
    showToast('camera access denied');
    setStatus('video upgrade failed', 'red');
    return;
  }

  // Show local video immediately
  $('localVideo').srcObject = videoStream;
  $('localVideo').classList.add('live');
  $('videoSide').classList.add('active');

  const pc = currentCall && currentCall.peerConnection;
  if(!pc){ sendSignal('video-ready'); setStatus('video call — live', 'green'); return; }

  const videoTrack = videoStream.getVideoTracks()[0];
  const audioTrack = videoStream.getAudioTracks()[0];

  // Replace audio sender first (no renegotiation needed)
  const audioSender = pc.getSenders().find(s => s.track && s.track.kind === 'audio');
  if(audioSender && audioTrack) await audioSender.replaceTrack(audioTrack);

  // Deterministic offerer: lexicographically smaller peer ID always offers
  const iAmOfferer = myId < partnerPeerId;

  if(iAmOfferer){
    // Set handler BEFORE addTrack so we catch the negotiationneeded event
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        db.ref(`matches/${currentMatchId}/webrtc/${myId}/offer`).set({
          sdp: offer.sdp, type: offer.type, ts: Date.now()
        });
      } catch(e){ console.error('offer error', e); }
    };

    // Listen for answerer's response
    db.ref(`matches/${currentMatchId}/webrtc/${partnerPeerId}/answer`).on('value', async snap => {
      const ans = snap.val();
      if(!ans) return;
      if(pc.signalingState === 'have-local-offer'){
        try { await pc.setRemoteDescription(new RTCSessionDescription(ans)); }
        catch(e){ console.error('set answer error', e); }
      }
    });

  } else {
    // Answerer: wait for offerer's offer via Firebase
    db.ref(`matches/${currentMatchId}/webrtc/${partnerPeerId}/offer`).on('value', async snap => {
      const ofr = snap.val();
      if(!ofr || pc.signalingState !== 'stable') return;
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(ofr));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        db.ref(`matches/${currentMatchId}/webrtc/${myId}/answer`).set({
          sdp: answer.sdp, type: answer.type, ts: Date.now()
        });
      } catch(e){ console.error('answer error', e); }
    });
  }

  // Now add the video track — fires onnegotiationneeded on offerer side
  const existingVideoSender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
  if(existingVideoSender){
    await existingVideoSender.replaceTrack(videoTrack);
  } else {
    pc.addTrack(videoTrack, videoStream);
  }

  sendSignal('video-ready');
  setStatus('video call — live', 'green');
}


/* ══════════════════════════════════════════
   PARTNER VIDEO READY (received signal)
   Real video display is handled by call.on('stream')
   when renegotiation completes — this triggers our
   upgrade if partner finishes rating before us.
══════════════════════════════════════════ */
function handleRemoteVideoReady(){
  if(phase === 'reveal' || phase === 'rating' || phase === 'session'){
    upgradeToVideo();
  }
}

/* ══════════════════════════════════════════
   SKIP / RESET
══════════════════════════════════════════ */
$('skipBtn').onclick = () => {
  sendSignal('skip');
  reset();
};

function reset(){
  clearTimers();
  stopSignalListener();

  if(currentCall){ try{ currentCall.close(); }catch(e){} currentCall=null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(videoStream){ videoStream.getTracks().forEach(t=>t.stop()); videoStream=null; }

  if(myLobbyKey){
    db.ref(`lobby/${myLobbyKey}`).remove();
    myLobbyKey = null;
  }

  // Reset state
  phase          = 'idle';
  partnerPeerId  = null;
  currentMatchId = null;
  ratingFired    = false;
  ratingSelected = false;

  // Reset UI
  $('startBtn').classList.remove('searching');
  $('startBtn').style.display  = 'block';
  $('startBtn').innerHTML      = 'START MATCHING';
  $('timer').style.display     = 'none';
  $('timer').innerText         = '02:00';
  $('skipBtn').style.display   = 'none';
  $('rating-screen').style.display = 'none';
  $('reveal').style.display    = 'none';
  $('videoSide').classList.remove('active');

  $('remoteAudio').srcObject = null;
  $('remoteVideo').srcObject = null;
  $('localVideo').srcObject  = null;
  $('remoteVideo').classList.remove('live');
  $('localVideo').classList.remove('live');

  setStatus('ready when you are', '');
}

</script>
