<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --red: #ff2d20; --green: #00ff87;
  --bg: #050505; --panel: #0c0c0c;
  --border: #1a1a1a; --muted: #444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html {
  height: 100dvh; width: 100vw;
  background: var(--bg); color: #fff;
  font-family: 'DM Mono', monospace; overflow: hidden;
}

/* (UNCHANGED UI — trimmed here for brevity in chat rendering) */
</style>
</head>

<body>

<!-- UI unchanged -->
<div class="app-wrapper">
  <div class="video-side" id="videoSide">
    <div class="user-slot">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="camera-placeholder">THEM</div>
    </div>
    <div class="user-slot">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="camera-placeholder">YOU</div>
    </div>
  </div>

  <div class="control-side">
    <div class="container">
      <div id="timer">02:00</div>
      <div class="logo">Rathe</div>
      <p class="tagline">rate then hate.</p>
      <div id="statusLine">ready when you are</div>
      <button id="startBtn" class="main-btn">START MATCHING</button>
    </div>
  </div>
</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<div id="rating-screen">
  <div id="ratingTitle">RATE THEM</div>
  <div id="ratingSubtitle">you have 10 seconds</div>
  <div class="rate-grid" id="rateGrid"></div>
  <div id="countdownBar"><div id="countdownFill"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
/* ── FIREBASE ── */
firebase.initializeApp({
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  authDomain: "rate-then-hate-backend.firebaseapp.com",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com",
  projectId: "rate-then-hate-backend",
  storageBucket: "rate-then-hate-backend.firebasestorage.app",
  messagingSenderId: "195653571803",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
});
const db = firebase.database();

/* ── PEERJS ── */
const peer = new Peer(undefined, {
  host: '0.peerjs.com',
  port: 443,
  path: '/',
  secure: true,
  debug: 1
});

/* ── STATE ── */
let myId, myLobbyKey, localStream, videoStream;
let partnerPeerId, currentMatchId, currentCall, signalRef;
let phase = 'idle';
let searchInterval, sessionTimer, ratingTimer;
let ratingSelected = false, ratingFired = false;

/* ── FIX: SAFE PEER CONNECTION ACCESS ── */
function getPC() {
  return currentCall?.peerConnection || currentCall?._pc || null;
}

/* ── UI HELPERS ── */
const $ = id => document.getElementById(id);
const setStatus = (msg, cls='') => {
  const el = $('statusLine');
  el.className = cls;
  el.innerHTML = msg;
};
function showToast(msg, dur=3000){
  const t = $('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

/* ── PEER EVENTS ── */
peer.on('open', id => {
  myId = id;
  setStatus('ready when you are');
});

peer.on('error', err => {
  console.error('PeerJS', err);
  showToast('connection error');
});

/* ── SIGNALING (FIXED) ── */
function listenForPartnerSignals(){
  if(!currentMatchId || !partnerPeerId) return;

  signalRef = db.ref(`matches/${currentMatchId}/signals/${partnerPeerId}`);
  signalRef.on('value', snap => {
    const val = snap.val();
    if(!val) return;

    if(val === 'skip') {
      showToast('they skipped you 💀');
      reset();
    }

    if(val === 'video-ready') {
      handleRemoteVideoReady();
    }
  });

  db.ref(`matches/${currentMatchId}/webrtc/${partnerPeerId}`).on('value', async snap => {
    const val = snap.val();
    const pc = getPC();   // ✅ FIX

    if(!pc || !val) return;

    if(val.offer && pc.signalingState === 'stable'){
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(val.offer));
        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        db.ref(`matches/${currentMatchId}/webrtc/${myId}/answer`)
          .set({sdp:ans.sdp,type:ans.type});
      }catch(e){console.error(e);}
    }

    if(val.answer && pc.signalingState === 'have-local-offer'){
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(val.answer));
      }catch(e){console.error(e);}
    }
  });
}

/* ── INITIATE CALL (FIXED SAFE RESET) ── */
function initiateCall(){
  if(currentCall) try { currentCall.close(); } catch(e){}

  const call = peer.call(partnerPeerId, localStream);
  handleCall(call);
}

/* ── HANDLE CALL ── */
function handleCall(call){
  currentCall = call;

  call.on('stream', remoteStream => {
    if(remoteStream.getVideoTracks().length > 0){
      $('remoteVideo').srcObject = remoteStream;
      $('remoteVideo').classList.add('live');
      $('videoSide').classList.add('active');
      return;
    }
    if(phase === 'connecting'){
      $('remoteAudio').srcObject = remoteStream;
      startSession();
    }
  });

  call.on('close', reset);
  call.on('error', reset);
}

/* ── VIDEO UPGRADE (FIXED) ── */
async function upgradeToVideo(){
  if(phase === 'video') return;
  phase = 'video';

  try{
    videoStream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
  }catch(e){
    showToast('camera access denied');
    return;
  }

  $('localVideo').srcObject = videoStream;
  $('localVideo').classList.add('live');
  $('videoSide').classList.add('active');

  const pc = getPC();   // ✅ FIX

  if(!pc){
    sendSignal('video-ready');
    setStatus('video call — live','green');
    return;
  }

  // safe renegotiation guard
  pc.onnegotiationneeded = async () => {
    if(pc.signalingState !== "stable") return;

    try{
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      db.ref(`matches/${currentMatchId}/webrtc/${myId}/offer`)
        .set({sdp:offer.sdp,type:offer.type});

    }catch(e){console.error(e);}
  };

  const videoTrack = videoStream.getVideoTracks()[0];

  const sender = pc.getSenders().find(s=>s.track?.kind === 'video');
  if(sender) await sender.replaceTrack(videoTrack);
  else pc.addTrack(videoTrack, videoStream);

  sendSignal('video-ready');
  setStatus('video call — live','green');
}

/* ── PARTNER VIDEO READY ── */
function handleRemoteVideoReady(){
  if(phase === 'session' || phase === 'reveal' || phase === 'rating'){
    upgradeToVideo();
  }
}

/* ── SKIP ── */
$('skipBtn').onclick = () => {
  sendSignal('skip');
  reset();
};

/* ── RESET ── */
function reset(){
  if(currentCall) try{currentCall.close();}catch(e){}
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  if(videoStream) videoStream.getTracks().forEach(t=>t.stop());

  currentCall = null;
  phase = 'idle';

  $('videoSide').classList.remove('active');
  setStatus('ready when you are');
}

/* ── SIGNAL SEND ── */
function sendSignal(type){
  if(!currentMatchId || !myId) return;
  db.ref(`matches/${currentMatchId}/signals/${myId}`).set(type);
}
</script>
</body>
</html>
