<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Reveal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: ledPulse 8s ease-in-out infinite;
        }

        @keyframes ledPulse {
            0% { background-color: #000000; }   
            50% { background-color: #1a1a1a; }  
            100% { background-color: #000000; } 
        }

        .container {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: -1.5px;
        }

        p {
            color: #a1a1a1;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 18px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        #cancelBtn {
            background-color: #ef4444;
            color: white;
            margin-top: 15px;
            display: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .searching {
            background-color: #22c55e !important;
            color: white !important;
            animation: pulse 1.5s infinite;
        }
    </style>

    <!-- Scripts -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        <h1>Voice Reveal</h1>
        <p>Talk to a random stranger instantly.</p>
        <button id="startBtn">Start Matching</button>
        <button id="cancelBtn">Cancel Search</button>
    </div>

<script>
// 1. Initialize Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
  projectId: "rate-then-hate-backend",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

// Start the app using the config above
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
    // 2. Setup Peer
    const peer = new Peer();
    const btn = document.getElementById('startBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    let localStream;
    let myId; 

    peer.on('open', (id) => {
        myId = id; 
        console.log('Your Voice ID is: ' + id);
    });

    peer.on('call', (call) => {
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
            call.answer(stream); 
            call.on('stream', (remoteStream) => {
                playStream(remoteStream);
            });
        });
    });

    // 3. Matchmaking
    btn.addEventListener('click', async () => {
        if (!myId) return alert("Still connecting... wait a second.");
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            btn.innerText = "Searching...";
            btn.classList.add('searching');
            cancelBtn.style.display = "block";

            const lobbyRef = db.ref('lobby');

            lobbyRef.once('value', (snapshot) => {
                const users = snapshot.val();
                
                if (users) {
                    const keys = Object.keys(users);
                    const partnerId = users[keys[0]];
                    db.ref('lobby/' + keys[0]).remove();

                    const call = peer.call(partnerId, localStream);
                    call.on('stream', (remoteStream) => { playStream(remoteStream); });
                    btn.innerText = "Connected!";
                } else {
                    const myEntry = lobbyRef.push(myId);
                    cancelBtn.onclick = () => {
                        myEntry.remove();
                        location.reload();
                    };
                }
            });
        } catch (err) {
            alert("Please allow mic access!");
        }
    });

    function playStream(stream) {
        const audio = new Audio();
        audio.srcObject = stream;
        audio.play();
    }
</script>
</body>
</html>
