<script>
/* ═════════ FIREBASE ═════════ */
firebase.initializeApp({
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  authDomain: "rate-then-hate-backend.firebaseapp.com",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com",
  projectId: "rate-then-hate-backend",
  storageBucket: "rate-then-hate-backend.firebasestorage.app",
  messagingSenderId: "195653571803",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
});

const db = firebase.database();

/* ═════════ PEERJS (FIX ONLY) ═════════ */
const peer = new Peer(undefined, {
  host: "0.peerjs.com",
  secure: true,
  port: 443,
  path: "/",
  debug: 1
});

/* ═════════ STATE ═════════ */
let myId = null;
let peerReady = false;

let localStream = null;
let videoStream = null;

let partnerPeerId = null;
let currentMatchId = null;
let currentCall = null;

let myLobbyKey = null;
let searchInterval = null;

let phase = "idle";

/* ═════════ UI HELPERS ═════════ */
const $ = id => document.getElementById(id);

const setStatus = (msg, cls="") => {
  const el = $("statusLine");
  el.className = cls;
  el.innerHTML = msg;
};

/* ═════════ PEER READY FIX (IMPORTANT) ═════════ */
peer.on("open", id => {
  myId = id;
  peerReady = true;
  setStatus("ready when you are");
  console.log("Peer ready:", id);
});

peer.on("error", err => {
  console.error("PeerJS error:", err);
});

/* ═════════ START BUTTON ═════════ */
$("startBtn").onclick = async () => {
  if (!peerReady) {
    setStatus("connecting to network...", "red");
    return;
  }

  if (phase !== "idle") return;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  } catch (e) {
    setStatus("mic blocked", "red");
    return;
  }

  phase = "searching";

  $("startBtn").classList.add("searching");
  $("startBtn").innerHTML = "SEARCHING<span class='dots'></span>";
  setStatus("scanning the void", "green");

  const ref = db.ref("lobby").push(myId);
  myLobbyKey = ref.key;

  searchInterval = setInterval(tryMatch, 1500);
};

/* ═════════ MATCHMAKING (FIXED RACE ONLY) ═════════ */
async function tryMatch() {
  if (phase !== "searching") return;

  const snap = await db.ref("lobby").once("value");
  const users = snap.val();
  if (!users) return;

  for (let k in users) {
    const pid = users[k];
    if (!pid || pid === myId) continue;

    const matchId = [myId, pid].sort().join("_");
    const ref = db.ref("matches/" + matchId);

    let won = false;

    await ref.transaction(cur => {
      if (cur) return;
      won = true;
      return { a: myId, b: pid, ts: Date.now() };
    });

    if (!won) continue;

    partnerPeerId = pid;
    currentMatchId = matchId;
    phase = "connecting";

    db.ref("lobby/" + k).remove();
    if (myLobbyKey) db.ref("lobby/" + myLobbyKey).remove();

    clearInterval(searchInterval);

    startCall();
    return;
  }
}

/* ═════════ CALL START ═════════ */
function startCall() {
  currentCall = peer.call(partnerPeerId, localStream);

  currentCall.on("stream", stream => {
    $("remoteAudio").srcObject = stream;
  });

  currentCall.on("close", reset);
}

/* ═════════ INCOMING CALL ═════════ */
peer.on("call", async call => {
  if (!localStream) {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  }

  partnerPeerId = call.peer;
  currentMatchId = [myId, partnerPeerId].sort().join("_");

  call.answer(localStream);

  call.on("stream", stream => {
    $("remoteAudio").srcObject = stream;
  });

  currentCall = call;
});

/* ═════════ VIDEO UPGRADE (SAFE VERSION) ═════════ */
async function upgradeVideo() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });
  } catch (e) {
    setStatus("camera blocked", "red");
    return;
  }

  $("localVideo").srcObject = videoStream;
  $("localVideo").classList.add("live");
  $("videoSide").classList.add("active");

  const pc = currentCall?.peerConnection;
  if (!pc) return;

  const vTrack = videoStream.getVideoTracks()[0];
  const aTrack = videoStream.getAudioTracks()[0];

  const aSender = pc.getSenders().find(s => s.track?.kind === "audio");
  const vSender = pc.getSenders().find(s => s.track?.kind === "video");

  if (aSender) await aSender.replaceTrack(aTrack);

  if (vSender) {
    await vSender.replaceTrack(vTrack);
  } else {
    pc.addTrack(vTrack, videoStream);
  }
}

/* ═════════ RESET ═════════ */
function reset() {
  phase = "idle";

  if (currentCall) currentCall.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());

  $("startBtn").classList.remove("searching");
  $("startBtn").innerHTML = "START MATCHING";

  $("videoSide").classList.remove("active");
  $("remoteAudio").srcObject = null;
}
</script>
