<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rathe | rate then hate</title>
    <style>
        :root { --red: #ff3b30; --bg: #000; --panel: #0a0a0a; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; touch-action: none; }
        .app-wrapper { display: flex; height: 100vh; width: 100vw; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .video-side { width: 0; flex: 0; display: flex; flex-direction: column; background: #000; overflow: hidden; opacity: 0; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; }
        .video-side.active { width: 60vw; flex: 1.5; opacity: 1; border-right: 1px solid #222; pointer-events: auto; }
        .user-slot { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; border-bottom: 1px solid #111; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 2; background: black; }
        .camera-placeholder { width: 100px; height: 100px; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .q-mark { font-size: 50px; font-weight: 800; }
        .control-side { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--panel); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .container { text-align: center; padding: 20px; width: 85%; max-width: 400px; }
        h1 { font-weight: 900; font-size: 4rem; margin: 0; letter-spacing: -3px; }
        .tagline { color: #666; margin-bottom: 50px; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .main-btn { background: #fff; color: #000; border: none; padding: 22px; font-size: 1.2rem; font-weight: 800; border-radius: 16px; width: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; z-index: 10; }
        #cancelBtn { background: #222; color: #fff; margin-top: 15px; display: none; }
        #skipBtn { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 340px; background: var(--red); color: white; padding: 22px; font-size: 1.2rem; font-weight: 900; border-radius: 18px; border: none; z-index: 9999; box-shadow: 0 15px 45px rgba(255, 59, 48, 0.4); }
        #timer { font-family: monospace; font-size: 2rem; color: var(--red); margin-bottom: 20px; display: none; font-weight: bold; }
        #rating-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10001; padding: 20px; }
        .rate-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; margin-top: 25px; }
        .rate-btn { padding: 20px; background: #111; color: #fff; border: 1px solid #333; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-wrapper" id="wrapper">
        <div class="video-side" id="videoSide">
            <div class="user-slot">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="camera-placeholder"><span class="q-mark">?</span></div>
            </div>
            <div class="user-slot">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="camera-placeholder"><span class="q-mark">?</span></div>
            </div>
        </div>
        <div class="control-side" id="controlSide">
            <div class="container">
                <div id="timer">02:00</div>
                <h1>Rathe</h1>
                <p class="tagline">rate then hate.</p>
                <button id="startBtn" class="main-btn">START MATCHING</button>
                <button id="cancelBtn" class="main-btn">CANCEL SEARCH</button>
            </div>
        </div>
    </div>
    <button id="skipBtn">SKIP / HATE</button>
    <audio id="remoteAudio" autoplay playsinline></audio>
    <div id="rating-screen">
        <h1 id="ratingTitle" style="font-size: 2.5rem;">RATE THEM</h1>
        <div class="rate-grid" id="rateGrid"></div>
    </div>

    <!-- BRAIN SCRIPTS -->
    <script src="https://unpkg.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA", 
            databaseURL: "https://firebaseio.com", 
            projectId: "rate-then-hate-backend", 
            appId: "1:195653571803:web:6482704037cb0f2835e8fe" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const peer = new Peer({ config: { 'iceServers': [{ url: 'stun:://google.com' }, { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }] }});

        let localStream, myId, myEntry, timerInterval, currentCall, searchingInterval, partnerPeerId, currentMatchId;
        let isConnected = false;

        peer.on('open', id => myId = id);

        function terminateAndRefresh() {
            if (currentMatchId) db.ref('matches/' + currentMatchId).remove();
            window.location.reload();
        }

        document.getElementById('skipBtn').onclick = terminateAndRefresh;

        document.getElementById('startBtn').onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('startBtn').innerText = "SEARCHING...";
                document.getElementById('cancelBtn').style.display = "block";
                myEntry = db.ref('lobby').push(myId);

                searchingInterval = setInterval(() => {
                    if (isConnected) return;
                    db.ref('lobby').once('value', snap => {
                        const users = snap.val();
                        if (!users) return;
                        const partnerKey = Object.keys(users).find(k => users[k] !== myId);
                        if (partnerKey) {
                            const pId = users[partnerKey];
                            db.ref('lobby/' + partnerKey).remove().then(() => {
                                partnerPeerId = pId;
                                currentMatchId = myId < pId ? myId + "_" + pId : pId + "_" + myId;
                                setupCallHandlers(peer.call(pId, localStream));
                            });
                        }
                    });
                }, 3000);
            } catch(e) { alert("Mic required."); }
        };

        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                localStream = stream;
                partnerPeerId = call.peer;
                currentMatchId = partnerPeerId < myId ? partnerPeerId + "_" + myId : myId + "_" + partnerPeerId;
                call.answer(stream);
                setupCallHandlers(call);
            });
        });

        function setupCallHandlers(call) {
            currentCall = call;
            isConnected = true;
            call.on('stream', rem => {
                if (rem.getVideoTracks().length > 0) {
                    document.getElementById('remoteVideo').srcObject = rem;
                    document.getElementById('rating-screen').style.display = 'none';
                } else {
                    finalizeConnection(rem);
                }
            });
            call.on('close', terminateAndRefresh);
            
            db.ref('matches/' + currentMatchId).on('value', snap => {
                const data = snap.val();
                if (data && Object.keys(data).length >= 2) {
                    triggerVideoReveal();
                }
            });
        }

        function finalizeConnection(stream) {
            document.getElementById('remoteAudio').srcObject = stream;
            document.getElementById('videoSide').classList.add('active');
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('timer').style.display = "block";
            document.getElementById('skipBtn').style.display = "block";

            let time = 120;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(--time < 0) { clearInterval(timerInterval); launchRating(); }
            }, 1000);
        }

        function launchRating() {
            document.getElementById('rating-screen').style.display = 'flex';
            const grid = document.getElementById('rateGrid');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const b = document.createElement('button');
                b.className = 'rate-btn'; b.innerText = i;
                b.onclick = () => {
                    db.ref('matches/' + currentMatchId + '/' + myId).set(i);
                    document.getElementById('ratingTitle').innerText = "WAITING FOR PARTNER...";
                    grid.style.display = 'none';
                };
                grid.appendChild(b);
            }
        }

        async function triggerVideoReveal() {
            try {
                const vidStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream.getTracks().forEach(t => t.stop());
                localStream = vidStream;
                document.getElementById('localVideo').srcObject = localStream;
                peer.call(partnerPeerId, localStream);
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
