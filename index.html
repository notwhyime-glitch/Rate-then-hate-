<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>

<style>
:root { --red:#ff3b30; --bg:#000; --panel:#0a0a0a; }
body,html{margin:0;padding:0;height:100vh;width:100vw;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;}
.app-wrapper{display:flex;height:100vh;width:100vw;}
.video-side{width:0;flex:0;display:flex;flex-direction:column;background:#000;overflow:hidden;opacity:0;transition:.5s;}
.video-side.active{width:60vw;flex:1.5;opacity:1;border-right:1px solid #222;}
.user-slot{flex:1;display:flex;justify-content:center;align-items:center;background:#050505;position:relative;}
video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.camera-placeholder{width:100px;height:100px;border:2px solid #fff;border-radius:50%;display:flex;justify-content:center;align-items:center;}
.q-mark{font-size:50px;font-weight:800;}
.control-side{flex:1;display:flex;justify-content:center;align-items:center;background:var(--panel);}
.container{text-align:center;width:85%;max-width:400px;}
h1{font-size:4rem;margin:0;}
.tagline{color:#666;margin-bottom:40px;}
.main-btn{background:#fff;color:#000;padding:20px;border:none;border-radius:16px;width:100%;font-weight:800;cursor:pointer;}
#cancelBtn{background:#222;color:#fff;margin-top:10px;display:none;}
#skipBtn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:340px;background:var(--red);color:#fff;padding:20px;border:none;border-radius:18px;}
#timer{font-size:2rem;color:var(--red);display:none;margin-bottom:20px;}
#rating-screen{position:fixed;inset:0;background:#000;display:none;flex-direction:column;justify-content:center;align-items:center;}
.rate-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%;margin-top:20px;}
.rate-btn{padding:20px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;}
</style>
</head>

<body>

<div class="app-wrapper">
<div class="video-side" id="videoSide">
<div class="user-slot"><video id="remoteVideo" autoplay playsinline></video><div class="camera-placeholder"><span class="q-mark">?</span></div></div>
<div class="user-slot"><video id="localVideo" autoplay playsinline muted></video><div class="camera-placeholder"><span class="q-mark">?</span></div></div>
</div>

<div class="control-side">
<div class="container">
<div id="timer">02:00</div>
<h1>Rathe</h1>
<p class="tagline">rate then hate.</p>
<button id="startBtn" class="main-btn">START MATCHING</button>
<button id="cancelBtn" class="main-btn">CANCEL SEARCH</button>
</div>
</div>
</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<div id="rating-screen">
<h1 id="ratingTitle">RATE THEM</h1>
<div id="rateGrid" class="rate-grid"></div>
</div>

<!-- FIXED LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA", 
    databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/", 
    projectId: "rate-then-hate-backend", 
    appId: "1:195653571803:web:6482704037cb0f2835e8fe" 
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const peer = new Peer({
    config:{
        iceServers:[
            {urls:'stun:stun.l.google.com:19302'},
            {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'}
        ]
    }
});

let myId,localStream,partnerPeerId,currentMatchId,isConnected=false,timerInterval;

peer.on('open',id=>myId=id);

document.getElementById('startBtn').onclick=async()=>{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
    db.ref('lobby').push(myId);

    setInterval(()=>{
        if(isConnected)return;
        db.ref('lobby').once('value',snap=>{
            let users=snap.val();
            if(!users)return;
            let key=Object.keys(users).find(k=>users[k]!==myId);
            if(key){
                let pid=users[key];
                db.ref('lobby/'+key).remove();
                partnerPeerId=pid;
                currentMatchId=[myId,pid].sort().join('_');
                peer.call(pid,localStream);
            }
        });
    },2000);
};

peer.on('call',call=>{
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
        localStream=stream;
        partnerPeerId=call.peer;
        currentMatchId=[myId,partnerPeerId].sort().join('_');
        call.answer(stream);

        call.on('stream',s=>{
            if(s.getVideoTracks().length){
                document.getElementById('remoteVideo').srcObject=s;
            } else {
                startSession(s);
            }
        });
    });
});

function startSession(stream){
    isConnected=true;
    document.getElementById('remoteAudio').srcObject=stream;
    document.getElementById('videoSide').classList.add('active');
    document.getElementById('timer').style.display="block";
    document.getElementById('skipBtn').style.display="block";

    let time=120;
    timerInterval=setInterval(()=>{
        let m=Math.floor(time/60),s=time%60;
        document.getElementById('timer').innerText=`${m}:${s<10?'0':''}${s}`;
        if(--time<0){clearInterval(timerInterval);showRating();}
    },1000);
}

function showRating(){
    document.getElementById('rating-screen').style.display='flex';
    let grid=document.getElementById('rateGrid');
    grid.innerHTML='';
    for(let i=1;i<=10;i++){
        let b=document.createElement('button');
        b.className='rate-btn';
        b.innerText=i;
        b.onclick=()=>{
            db.ref('matches/'+currentMatchId+'/'+myId).set(i);
            document.getElementById('ratingTitle').innerText="WAITING...";
        };
        grid.appendChild(b);
    }
}

document.getElementById('skipBtn').onclick=()=>location.reload();
</script>

</body>
</html>
