<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rathe | rate then hate</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED UI — same as yours, trimmed here for space safety) */
body,html{margin:0;padding:0;height:100vh;background:#050505;color:#fff;font-family:DM Mono;overflow:hidden}
.app-wrapper{display:flex;height:100vh}
.video-side{width:0;flex:0;transition:.5s;overflow:hidden;background:#000}
.video-side.active{flex:1.5;width:60vw}
.user-slot{flex:1;position:relative}
video{width:100%;height:100%;object-fit:cover;position:absolute;opacity:0}
video.live{opacity:1}
.control-side{flex:1;display:flex;align-items:center;justify-content:center}
button{cursor:pointer}
</style>
</head>

<body>

<div class="app-wrapper">
  <div class="video-side" id="videoSide">
    <div class="user-slot">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="user-slot">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <div class="control-side">
    <button id="startBtn">START</button>
  </div>
</div>

<button id="skipBtn" style="display:none">SKIP</button>
<audio id="remoteAudio" autoplay></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
/* ───────── FIREBASE ───────── */
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
});
const db = firebase.database();

/* ───────── PEER (FIXED CONFIG) ───────── */
const peer = new Peer(undefined, {
  host: "0.peerjs.com",
  secure: true,
  port: 443,
  path: "/",
  debug: 2
});

/* ───────── STATE ───────── */
let myId = null;
let ready = false;

let localStream;
let videoStream;

let partnerId;
let matchId;
let call;

let lobbyKey;
let searching = false;

/* ───────── UI ───────── */
const $ = id => document.getElementById(id);

/* ───────── PEER READY (CRITICAL FIX) ───────── */
peer.on("open", id => {
  myId = id;
  ready = true;
  console.log("Peer ready:", id);
});

/* ───────── START ───────── */
$("startBtn").onclick = async () => {
  if (!ready) {
    alert("Peer not ready yet — wait 1–2 sec");
    return;
  }

  if (searching) return;
  searching = true;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  } catch (e) {
    alert("Mic blocked");
    return;
  }

  const ref = db.ref("lobby").push(myId);
  lobbyKey = ref.key;

  setInterval(findMatch, 1500);
};

/* ───────── MATCHMAKING (FIXED RACE SAFETY) ───────── */
async function findMatch() {
  if (!searching) return;

  const snap = await db.ref("lobby").once("value");
  const users = snap.val();
  if (!users) return;

  for (let k in users) {
    const pid = users[k];
    if (!pid || pid === myId) continue;

    const id = [myId, pid].sort().join("_");
    const ref = db.ref("matches/" + id);

    let ok = false;

    await ref.transaction(cur => {
      if (cur) return;
      ok = true;
      return { a: myId, b: pid, ts: Date.now() };
    });

    if (!ok) continue;

    partnerId = pid;
    matchId = id;

    db.ref("lobby/" + k).remove();
    if (lobbyKey) db.ref("lobby/" + lobbyKey).remove();

    startCall();
    return;
  }
}

/* ───────── CALL INIT ───────── */
function startCall() {
  call = peer.call(partnerId, localStream);

  call.on("stream", stream => {
    $("remoteAudio").srcObject = stream;
  });

  call.on("close", reset);
}

/* ───────── INCOMING CALL ───────── */
peer.on("call", async incoming => {
  if (!localStream) {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  }

  partnerId = incoming.peer;
  matchId = [myId, partnerId].sort().join("_");

  incoming.answer(localStream);

  incoming.on("stream", stream => {
    $("remoteAudio").srcObject = stream;
  });

  call = incoming;
});

/* ───────── UPGRADE TO VIDEO (FIXED CORE ISSUE) ───────── */
async function upgradeVideo() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });
  } catch (e) {
    alert("Camera blocked");
    return;
  }

  $("localVideo").srcObject = videoStream;
  $("localVideo").classList.add("live");
  $("videoSide").classList.add("active");

  const pc = call?.peerConnection;
  if (!pc) return;

  const videoTrack = videoStream.getVideoTracks()[0];
  const audioTrack = videoStream.getAudioTracks()[0];

  const senderVideo = pc.getSenders().find(s => s.track?.kind === "video");
  const senderAudio = pc.getSenders().find(s => s.track?.kind === "audio");

  if (senderAudio) await senderAudio.replaceTrack(audioTrack);

  if (senderVideo) {
    await senderVideo.replaceTrack(videoTrack);
  } else {
    pc.addTrack(videoTrack, videoStream);
  }
}

/* ───────── RESET ───────── */
function reset() {
  searching = false;

  if (call) call.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());

  $("videoSide").classList.remove("active");
  $("remoteAudio").srcObject = null;
}
</script>

</body>
</html>
