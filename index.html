<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Reveal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .app-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- LEFT SIDE: THE MYSTERY VIEWPORTS --- */
        .video-side {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            background: #000;
            border-right: 1px solid #222;
            transition: all 0.5s ease;
            /* Hidden initially until connected */
            transform: translateX(-100%); 
            opacity: 0;
        }

        .video-side.active {
            transform: translateX(0);
            opacity: 1;
        }

        .user-slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #111;
            position: relative;
            background: #050505;
        }

        .camera-placeholder {
            width: 180px;
            height: 180px;
            background: #000;
            border: 4px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .q-mark {
            font-size: 100px;
            font-weight: 800;
            color: #fff;
            user-select: none;
        }

        .label {
            margin-top: 20px;
            color: #555;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
        }

        /* --- RIGHT SIDE: CONTROLS --- */
        .control-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            position: relative;
            z-index: 10;
        }

        .container {
            text-align: center;
            padding: 40px;
            width: 100%;
            max-width: 350px;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
        }

        p {
            color: #a1a1a1;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 18px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        #cancelBtn {
            background-color: #ef4444;
            color: white;
            margin-top: 15px;
            display: none;
        }

        #skipBtn {
            background-color: #ff3333;
            color: white;
            margin-top: 20px;
            display: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .searching {
            background-color: #22c55e !important;
            color: white !important;
            animation: pulse 1.5s infinite;
        }
    </style>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <!-- LEFT SIDE: Viewports -->
        <div class="video-side" id="videoSide">
            <div class="user-slot">
                <div class="camera-placeholder">
                    <span class="q-mark">?</span>
                </div>
                <div class="label">Stranger</div>
            </div>
            <div class="user-slot">
                <div class="camera-placeholder">
                    <span class="q-mark">?</span>
                </div>
                <div class="label">You</div>
            </div>
        </div>

        <!-- RIGHT SIDE: Controls -->
        <div class="control-side">
            <div class="container">
                <h1 id="mainTitle">Voice Reveal</h1>
                <p id="statusDesc">Talk to a random stranger instantly.</p>
                
                <button id="startBtn">Start Matching</button>
                <button id="cancelBtn">Cancel Search</button>
                <button id="skipBtn">Skip / Hate</button>
            </div>
        </div>
    </div>

<script>
// 1. Initialize Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
  projectId: "rate-then-hate-backend",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. Setup Peer & Elements
const peer = new Peer();
const startBtn = document.getElementById('startBtn');
const cancelBtn = document.getElementById('cancelBtn');
const skipBtn = document.getElementById('skipBtn');
const videoSide = document.getElementById('videoSide');
const statusDesc = document.getElementById('statusDesc');

let localStream;
let myId; 
let myEntry;

peer.on('open', (id) => {
    myId = id; 
    console.log('Your Voice ID: ' + id);
});

// Incoming Call Handler
peer.on('call', (call) => {
    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
        localStream = stream;
        call.answer(stream); 
        call.on('stream', (remoteStream) => {
            playStream(remoteStream);
            showCallUI();
        });
    });
});

// 3. Matchmaking Logic
startBtn.addEventListener('click', async () => {
    if (!myId) return alert("Still connecting... wait a second.");
    
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        startBtn.innerText = "Searching...";
        startBtn.classList.add('searching');
        cancelBtn.style.display = "block";

        const lobbyRef = db.ref('lobby');

        lobbyRef.once('value', (snapshot) => {
            const users = snapshot.val();
            
            if (users) {
                // Partner Found
                const keys = Object.keys(users);
                const partnerId = users[keys[0]];
                db.ref('lobby/' + keys[0]).remove();

                const call = peer.call(partnerId, localStream);
                call.on('stream', (remoteStream) => { 
                    playStream(remoteStream); 
                    showCallUI();
                });
            } else {
                // Join Lobby
                myEntry = lobbyRef.push(myId);
                cancelBtn.onclick = () => {
                    myEntry.remove();
                    location.reload();
                };
            }
        });
    } catch (err) {
        alert("Please allow mic access!");
    }
});

// UI Transition Function
function showCallUI() {
    videoSide.classList.add('active');
    startBtn.style.display = "none";
    cancelBtn.style.display = "none";
    skipBtn.style.display = "block";
    statusDesc.innerText = "Connected. Don't be shy.";
    
    skipBtn.onclick = () => {
        if (myEntry) myEntry.remove();
        location.reload();
    };
}

function playStream(stream) {
    const audio = new Audio();
    audio.srcObject = stream;
    audio.autoplay = true;
    document.body.appendChild(audio);
    
    audio.play().catch(() => {
        window.addEventListener('click', () => audio.play(), { once: true });
    });
}
</script>
</body>
</html>
