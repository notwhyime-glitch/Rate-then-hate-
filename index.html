<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>

<style>
:root { --red:#ff3b30; --bg:#000; --panel:#0a0a0a; --green:#19ff6a; }

body,html{
margin:0;
padding:0;
height:100dvh;
width:100vw;
background:var(--bg);
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
overflow:hidden;
}

.app-wrapper{
display:flex;
height:100dvh;
width:100vw;
}

.video-side{
width:0;
flex:0;
display:flex;
flex-direction:column;
background:#000;
opacity:0;
transition:.5s;
overflow:hidden;
}

.video-side.active{
width:60vw;
flex:1.5;
opacity:1;
border-right:1px solid #222;
}

.user-slot{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
position:relative;
overflow:hidden;
}

.user-slot video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:2;
}

.camera-placeholder{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:3;
transition:opacity .25s ease;
font-size:50px;
font-weight:800;
}

.user-slot.revealed .camera-placeholder{
opacity:0;
pointer-events:none;
}

.control-side{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:var(--panel);
}

.container{
text-align:center;
width:85%;
max-width:400px;
}

h1{
font-size:4rem;
margin:0;
}

.tagline{
color:#666;
margin-bottom:40px;
}

.main-btn{
background:#fff;
color:#000;
padding:20px;
border:none;
border-radius:16px;
width:100%;
font-weight:800;
cursor:pointer;
}

#startBtn.searching{
background:var(--green);
color:#000;
}

#skipBtn{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:340px;
background:var(--red);
color:#fff;
padding:20px;
border:none;
border-radius:18px;
font-weight:900;
z-index:9998;
}

#timer{
font-size:2rem;
color:var(--red);
display:none;
margin-bottom:20px;
}

#rating-screen{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9997;
}

.rate-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
width:100%;
margin-top:20px;
}

.rate-btn{
padding:20px;
background:#111;
border:1px solid #333;
border-radius:10px;
color:#fff;
}

#reveal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:#000;
color:var(--green);
font-size:6rem;
font-weight:900;
z-index:9999;
}
</style>
</head>

<body>

<div id="reveal">3</div>

<div class="app-wrapper">
  <div class="video-side" id="videoSide">
    <div class="user-slot">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="camera-placeholder">?</div>
    </div>

    <div class="user-slot">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="camera-placeholder">?</div>
    </div>
  </div>

  <div class="control-side">
    <div class="container">
      <div id="timer">02:00</div>
      <h1>Rathe</h1>
      <p class="tagline">rate then hate.</p>
      <button id="startBtn" class="main-btn">START MATCHING</button>
    </div>
  </div>
</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<div id="rating-screen">
  <h1 id="ratingTitle">RATE THEM</h1>
  <div id="rateGrid" class="rate-grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC...",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com/",
  projectId: "rate-then-hate-backend",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const peer = new Peer();

let myId = null;
let localStream = null;
let partnerPeerId = null;
let currentMatchId = null;
let currentCall = null;

let phase = "idle";
let timerInterval = null;
let searchInterval = null;
let ratingTimer = null;
let revealTimer = null;
let revealSafetyTimer = null;

let ratingCountdown = 10;
let ratingSelected = false;
let videoUpgraded = false;
let lobbyEntryRef = null;

peer.on('open', id => {
  myId = id;
});

peer.on('disconnected', () => {
  try {
    peer.reconnect();
  } catch (e) {
    console.error(e);
  }
});

peer.on('error', () => {
  hardReset();
});

function revealVideoSlots() {
  document.querySelectorAll('.user-slot').forEach(s => s.classList.add('revealed'));
}

function resetUI() {
  document.getElementById('rating-screen').style.display = 'none';
  document.getElementById('rateGrid').style.display = 'grid';
  document.getElementById('ratingTitle').innerText = 'RATE THEM';
  document.getElementById('ratingTitle').style.color = '#fff';
  document.getElementById('reveal').style.display = 'none';
}

function setSearchUI(on) {
  const btn = document.getElementById('startBtn');
  btn.classList.toggle('searching', on);
  btn.innerText = on ? 'SEARCHING...' : 'START MATCHING';
  document.getElementById('skipBtn').style.display = on ? 'block' : 'none';
}

function clearSearchLoop() {
  if (searchInterval) {
    clearInterval(searchInterval);
    searchInterval = null;
  }
  if (lobbyEntryRef) {
    lobbyEntryRef.remove().catch(() => {});
    lobbyEntryRef = null;
  }
}

function clearSessionTimers() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  if (ratingTimer) {
    clearInterval(ratingTimer);
    ratingTimer = null;
  }
  if (revealTimer) {
    clearInterval(revealTimer);
    revealTimer = null;
  }
  if (revealSafetyTimer) {
    clearTimeout(revealSafetyTimer);
    revealSafetyTimer = null;
  }
}

function setMutedState(state) {
  if (localStream) {
    localStream.getAudioTracks().forEach(t => {
      t.enabled = !state;
    });
  }

  const ra = document.getElementById('remoteAudio');
  ra.muted = state;
  ra.volume = state ? 0 : 1;
}

function cleanupAll() {
  clearSearchLoop();
  clearSessionTimers();
  setMutedState(false);

  try {
    currentCall?.close();
  } catch (e) {}

  currentCall = null;
  phase = "idle";
}

function hardReset() {
  try {
    if (lobbyEntryRef) {
      lobbyEntryRef.remove();
    }
  } catch (e) {}

  try {
    db.ref('lobby').once('value', snap => {
      const users = snap.val();
      if (!users) return;

      Object.keys(users).forEach(k => {
        if (users[k] === myId) {
          db.ref('lobby/' + k).remove().catch(() => {});
        }
      });
    });
  } catch (e) {}

  cleanupAll();

  setTimeout(() => {
    location.reload();
  }, 300);
}

document.getElementById('startBtn').onclick = async () => {
  if (searchInterval || phase !== "idle") return;
  if (!myId) return;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    alert("Mic required.");
    return;
  }

  phase = "searching";
  setSearchUI(true);

  if (!lobbyEntryRef) {
    lobbyEntryRef = db.ref('lobby').push(myId);
  }

  searchInterval = setInterval(() => {
    if (phase !== "searching") return;

    db.ref('lobby').once('value', snap => {
      const users = snap.val();
      if (!users) return;

      const key = Object.keys(users).find(k => users[k] !== myId);
      if (!key) return;

      const pid = users[key];
      if (!pid || pid === myId) return;

      clearSearchLoop();

      partnerPeerId = pid;
      currentMatchId = [myId, pid].sort().join('_');

      phase = "connecting";
      startCall(peer.call(pid, localStream));
    });
  }, 2000);
};

peer.on('call', call => {
  if (phase === "rating" || phase === "reveal" || phase === "video") {
    try { call.close(); } catch (e) {}
    return;
  }

  if (!myId) {
    try { call.close(); } catch (e) {}
    return;
  }

  clearSearchLoop();

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    localStream = stream;
    partnerPeerId = call.peer;
    currentMatchId = [myId, partnerPeerId].sort().join('_');

    phase = "connecting";
    call.answer(stream);
    startCall(call);
  }).catch(() => {
    try { call.close(); } catch (e) {}
  });
});

function startCall(call) {
  currentCall = call;

  call.on('stream', s => {
    const hasVideo = s.getVideoTracks && s.getVideoTracks().length > 0;

    if (hasVideo) {
      document.getElementById('remoteVideo').srcObject = s;
      document.getElementById('videoSide').classList.add('active');
      revealVideoSlots();
      return;
    }

    if (phase === "connecting" || phase === "searching") {
      startSession(s);
    } else {
      document.getElementById('remoteAudio').srcObject = s;
    }
  });

  call.on('close', hardReset);
  call.on('error', hardReset);
}

function startSession(stream) {
  if (phase === "session" || phase === "rating" || phase === "reveal" || phase === "video") return;

  phase = "session";
  document.getElementById('remoteAudio').srcObject = stream;
  document.getElementById('videoSide').classList.add('active');
  document.getElementById('timer').style.display = 'block';
  document.getElementById('skipBtn').style.display = 'block';

  let end = Date.now() + 120000;

  const tick = () => {
    const r = end - Date.now();
    if (r <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      showRating();
      return;
    }

    const t = Math.floor(r / 1000);
    document.getElementById('timer').innerText =
      `${Math.floor(t / 60)}:${String(t % 60).padStart(2, '0')}`;
  };

  tick();
  timerInterval = setInterval(tick, 250);
}

function showRating() {
  if (phase !== "session") return;

  phase = "rating";
  setMutedState(true);

  document.getElementById('rating-screen').style.display = 'flex';

  const grid = document.getElementById('rateGrid');
  const title = document.getElementById('ratingTitle');

  grid.innerHTML = '';

  if (ratingTimer) clearInterval(ratingTimer);

  ratingCountdown = 10;
  ratingSelected = false;
  videoUpgraded = false;

  title.style.color = "red";
  title.innerText = "RATE THEM (10)";
  grid.style.display = 'grid';

  ratingTimer = setInterval(() => {
    if (ratingSelected) return;

    ratingCountdown--;

    if (ratingCountdown <= 0) {
      finishRating(5);
      return;
    }

    title.innerText = `RATE THEM (${ratingCountdown})`;
  }, 1000);

  for (let i = 1; i <= 10; i++) {
    const b = document.createElement('button');
    b.className = 'rate-btn';
    b.innerText = i;
    b.onclick = () => finishRating(i);
    grid.appendChild(b);
  }
}

function finishRating(val) {
  if (phase !== "rating") return;

  phase = "reveal";
  ratingSelected = true;

  if (ratingTimer) {
    clearInterval(ratingTimer);
    ratingTimer = null;
  }

  db.ref('matches/' + currentMatchId + '/' + myId).set(val).catch(() => {});

  document.getElementById('ratingTitle').innerText = "PREPARING REVEAL...";
  document.getElementById('rateGrid').style.display = 'none';

  hideRevealCountdown();
  setRevealCountdown(3);

  revealTimer = setInterval(() => {
    const el = document.getElementById('reveal');
    let t = parseInt(el.innerText, 10);
    t -= 1;

    if (t <= 0) {
      clearInterval(revealTimer);
      revealTimer = null;
      hideRevealCountdown();
      completeReveal();
      return;
    }

    el.innerText = t;
  }, 1000);

  revealSafetyTimer = setTimeout(() => {
    if (phase === "reveal" && !videoUpgraded) {
      completeReveal();
    }
  }, 6000);
}

function setRevealCountdown(text) {
  const el = document.getElementById('reveal');
  el.style.display = 'flex';
  el.innerText = text;
}

function hideRevealCountdown() {
  document.getElementById('reveal').style.display = 'none';
}

function completeReveal() {
  if (videoUpgraded) return;
  videoUpgraded = true;
  phase = "video";
  clearSessionTimers();
  upgradeToVideo();
}

async function upgradeToVideo() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });

    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    revealVideoSlots();

    const pc = currentCall && currentCall.peerConnection;
    if (pc && typeof pc.getSenders === 'function') {
      const senders = pc.getSenders() || [];
      const videoTrack = stream.getVideoTracks()[0];
      const audioTrack = stream.getAudioTracks()[0];

      const videoSender = senders.find(s => s.track && s.track.kind === 'video');
      const audioSender = senders.find(s => s.track && s.track.kind === 'audio');

      if (videoTrack) {
        if (videoSender && typeof videoSender.replaceTrack === 'function') {
          await videoSender.replaceTrack(videoTrack);
        } else if (typeof pc.addTrack === 'function') {
          try { pc.addTrack(videoTrack, stream); } catch (e) {}
        }
      }

      if (audioTrack && !audioSender && typeof pc.addTrack === 'function') {
        try { pc.addTrack(audioTrack, stream); } catch (e) {}
      }
    }

    setMutedState(false);
    resetUI();
  } catch (err) {
    console.error("Video upgrade failed:", err);
    revealVideoSlots();
    setMutedState(false);
    resetUI();
  }
}

document.getElementById('skipBtn').onclick = hardReset;
window.addEventListener('beforeunload', cleanupAll);
</script>

</body>
</html>
