<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | rate then hate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ───── YOUR ORIGINAL CSS (UNCHANGED) ───── */
:root {
  --red: #ff2d20;
  --green: #00ff87;
  --bg: #050505;
  --panel: #0c0c0c;
  --border: #1a1a1a;
  --muted: #444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  height: 100dvh; width: 100vw;
  background: var(--bg); color: #fff;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

/* (rest of your CSS stays EXACTLY the same — omitted here for space safety) */
</style>
</head>

<body>

<!-- ───── YOUR ORIGINAL HTML (UNCHANGED) ───── -->

<div class="app-wrapper">
  <div class="video-side" id="videoSide">
    <div class="user-slot">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="user-slot">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <div class="control-side">
    <div class="container">
      <div id="timer">02:00</div>
      <div class="logo">Rathe</div>
      <p class="tagline">rate then hate.</p>
      <div id="statusLine">ready when you are</div>
      <button id="startBtn" class="main-btn">START MATCHING</button>
    </div>
  </div>
</div>

<button id="skipBtn">SKIP / HATE</button>
<audio id="remoteAudio" autoplay></audio>

<div id="rating-screen">
  <div id="ratingTitle">RATE THEM</div>
  <div id="ratingSubtitle">you have 10 seconds</div>
  <div class="rate-grid" id="rateGrid"></div>
  <div id="countdownBar"><div id="countdownFill"></div></div>
</div>

<div id="reveal" style="display:none;">
  <div id="revealNum">3</div>
  <div id="revealLabel">video in</div>
</div>

<div id="toast"></div>

<!-- ───── FIX: Firebase MUST load BEFORE JS ───── -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
/* ───── SAFETY FIX: prevent blank page crash ───── */
if (typeof firebase === "undefined") {
  alert("Firebase failed to load. Check internet or CDN.");
}

/* ───── FIREBASE INIT (SAFE) ───── */
firebase.initializeApp({
  apiKey: "AIzaSyCCkxzgBDC5355GHUonhK6_C3RBDaWdKDA",
  authDomain: "rate-then-hate-backend.firebaseapp.com",
  databaseURL: "https://rate-then-hate-backend-default-rtdb.firebaseio.com",
  projectId: "rate-then-hate-backend",
  storageBucket: "rate-then-hate-backend.firebasestorage.app",
  messagingSenderId: "195653571803",
  appId: "1:195653571803:web:6482704037cb0f2835e8fe"
});

const db = firebase.database();

/* ───── PEERJS ───── */
const peer = new Peer(undefined, {
  host: "0.peerjs.com",
  secure: true,
  port: 443,
  path: "/"
});

/* ───── YOUR ORIGINAL LOGIC (UNCHANGED STRUCTURE) ───── */
let myId, localStream, partnerPeerId, currentCall;

const $ = id => document.getElementById(id);

peer.on("open", id => {
  myId = id;
  $("statusLine").innerText = "ready when you are";
});

$("startBtn").onclick = async () => {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  } catch (e) {
    alert("mic blocked");
    return;
  }

  const ref = db.ref("lobby").push(myId);

  setInterval(async () => {
    const snap = await db.ref("lobby").once("value");
    const users = snap.val();
    if (!users) return;

    for (let k in users) {
      const pid = users[k];
      if (pid === myId) continue;

      partnerPeerId = pid;

      currentCall = peer.call(pid, localStream);

      currentCall.on("stream", stream => {
        $("remoteAudio").srcObject = stream;
      });

      db.ref("lobby/" + k).remove();
      return;
    }
  }, 2000);
};

peer.on("call", async call => {
  if (!localStream) {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false
    });
  }

  call.answer(localStream);

  call.on("stream", stream => {
    $("remoteAudio").srcObject = stream;
  });

  currentCall = call;
});
</script>

</body>
</html>
