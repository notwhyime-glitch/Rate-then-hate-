<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rathe | Guess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #ff2d20; --green: #00ff87; --yellow: #ffd60a; --blue: #00b4ff;
  --bg: #050505; --panel: #0c0c0c; --border: #1a1a1a; --muted: #444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body,html{height:100dvh;width:100vw;background:var(--bg);color:#fff;font-family:'DM Mono',monospace;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.035;}

/* SCREENS */
.screen{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:24px;z-index:10;}
.screen.active{display:flex;}
#modeScreen{background:var(--panel);animation:bgShift 20s cubic-bezier(.45,0,.55,1) infinite alternate;}
@keyframes bgShift{0%{background:#080808}100%{background:#2a2a2a}}
#lobbyScreen,#joinScreen{background:#070707;}

/* SHARED */
.logo-sm{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:6px;background:linear-gradient(135deg,#fff 0%,#888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.sub{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:32px;}
.btn{width:100%;max-width:340px;padding:16px;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;cursor:pointer;transition:transform .15s,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn-white{background:#fff;color:#000;}
.btn-dark{background:#111;color:#fff;border:1px solid #2a2a2a;}
.btn-ghost{background:transparent;color:#666;border:1px solid #222;font-size:1rem;}
.gap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;align-items:center;}
.code-input{width:100%;max-width:340px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:18px;font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:8px;color:var(--green);text-align:center;text-transform:uppercase;margin-bottom:16px;outline:none;}
.code-input:focus{border-color:#444;}
.room-code-display{background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:16px 24px;font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:8px;color:var(--green);margin-bottom:8px;text-align:center;}
.room-code-hint{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:24px;}
.player-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.player-slot{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:2px;color:#666;text-transform:uppercase;}
.player-slot.filled{border-color:#2a2a2a;color:#aaa;}
.player-slot.filled.me{border-color:rgba(0,255,135,0.3);color:var(--green);}
.player-dot{width:8px;height:8px;border-radius:50%;background:#222;flex-shrink:0;}
.player-dot.green{background:var(--green);box-shadow:0 0 6px rgba(0,255,135,0.6);}
.lobby-status{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;}

/* LOADING OVERLAY */
#loadingOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  z-index:9999;backdrop-filter:blur(10px);
}
#loadingOverlay.active{display:flex;}
.loading-spinner{
  width:36px;height:36px;border:2px solid #1a1a1a;border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

/* GAME SCREEN */
#gameScreen{background:#000;padding:0;justify-content:flex-start;overflow:hidden;}

/* LAYOUT: cams left, chat right on desktop / cams top chat bottom on mobile */
.game-layout{display:flex;width:100vw;height:100dvh;}

/* CAM AREA */
.cams-area{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;flex:0 0 58vw;height:100dvh;position:relative;}
.cams-area.two{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
.cams-area.three{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}

@media(max-width:600px){
  .game-layout{flex-direction:column;}
  .cams-area{flex:0 0 45dvh;width:100vw;height:45dvh;grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
  .cams-area.two{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
  .cams-area.three{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr;}
  .chat-area{flex:1;border-left:none;border-top:1px solid #111;min-height:0;}
  .char-panel-item{padding:6px 8px;}
  .cpi-img{width:32px;height:32px;}
  .cpi-name{font-size:0.85rem;}
  .chat-hud{padding:6px 10px;}
  .hud-round{font-size:0.9rem;}
  .messages{padding:6px;}
  #charsPanel{flex-wrap:nowrap;overflow-x:auto;}
}

.cam-slot{position:relative;overflow:hidden;background:#060606;border:2px solid var(--green);box-shadow:0 0 12px rgba(0,255,135,0.4),0 0 32px rgba(0,255,135,0.1),inset 0 0 12px rgba(0,255,135,0.04);}
.cam-slot video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s ease;}
.cam-slot video.live{opacity:1;}
.cam-slot.local video{transform:scaleX(-1);}

/* PLAYER NUMBER BADGE */
.player-num{position:absolute;top:8px;left:10px;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:#fff;z-index:10;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.player-num.active-turn{color:var(--green);}

/* CHARACTER CARD — visible to others, hidden from self */
.char-card{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to top,rgba(0,0,0,.95) 60%,transparent);
  padding:12px 12px 14px;z-index:10;
}
.char-card.hidden-self{filter:blur(30px);pointer-events:none;user-select:none;}
.char-img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid #333;}
.char-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:#fff;}
.char-cat{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* CHARS PANEL — shows all characters above chat */
#charsPanel{
  display:flex;gap:0;border-bottom:1px solid #1a1a1a;
  background:#080808;flex-shrink:0;flex-wrap:wrap;
}
.char-panel-item{
  flex:1;min-width:0;display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-right:1px solid #111;position:relative;
}
.char-panel-item:last-child{border-right:none;}
.char-panel-item.is-mine .cpi-img,
.char-panel-item.is-mine .cpi-info{opacity:0;pointer-events:none;}
.char-panel-item.is-mine::after{
  content:'YOUR CHARACTER';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
}
.cpi-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid #222;}
.cpi-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
.cpi-label{font-size:7px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.cpi-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpi-cat{font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.cpi-num{font-size:8px;letter-spacing:1.5px;color:var(--green);text-transform:uppercase;}

/* GUESSED OVERLAY */
.cam-slot.guessed::after{content:'✓ GUESSED';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:var(--green);background:rgba(0,0,0,.6);z-index:20;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;background:#080808;border-left:1px solid #111;min-width:0;}

/* HUD */
.chat-hud{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #111;flex-shrink:0;}
.hud-round{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--red);}
.hud-turn{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.hud-turn span{color:var(--green);}

/* SCORES */
.scores-bar{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid #111;flex-shrink:0;flex-wrap:wrap;}
.score-chip{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:20px;padding:4px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#666;display:flex;align-items:center;gap:6px;}
.score-chip.me{border-color:rgba(0,255,135,0.3);color:var(--green);}
.score-chip .pts{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff;}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:#1a1a1a transparent;}
.msg{display:flex;flex-direction:column;gap:2px;}
.msg-meta{font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.msg-meta.me-meta{text-align:right;}
.msg-bubble{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:8px 12px;font-size:11px;line-height:1.5;color:#ccc;max-width:90%;word-break:break-word;}
.msg-bubble.me-bubble{background:#0d1f0d;border-color:rgba(0,255,135,0.2);color:#fff;align-self:flex-end;}
.msg-bubble.system{background:transparent;border-color:transparent;color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:4px;}
.msg-bubble.correct{background:rgba(0,255,135,0.08);border-color:rgba(0,255,135,0.3);color:var(--green);}

/* GUESS INPUT ROW */
.guess-row{display:none;gap:8px;padding:6px 10px;border-top:1px solid #111;flex-shrink:0;}
#guessInput{flex:1;background:#0d0d0d;border:1px solid rgba(255,214,10,0.3);border-radius:8px;padding:10px 12px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;outline:none;}
#guessInput::placeholder{color:#333;}
#guessBtn{background:var(--yellow);color:#000;border:none;border-radius:8px;padding:10px 14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;flex-shrink:0;}

/* ROUND END OVERLAY */
#roundOverlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:32px;gap:16px;backdrop-filter:blur(12px);text-align:center;}
#roundOverlay.active{display:flex;}
.ro-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:5px;color:var(--red);}
.ro-scores{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;}
.ro-score-row{display:flex;align-items:center;justify-content:space-between;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;}
.ro-score-name{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#aaa;}
.ro-score-pts{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);}

/* END OVERLAY */
#endOverlay{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:600;padding:32px;gap:16px;backdrop-filter:blur(16px);text-align:center;}
#endOverlay.active{display:flex;}
.eo-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:5px;}
.eo-winner{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:-8px;}

/* LEAVE CONFIRM */
#leaveConfirm{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(10px);}
#leaveConfirm.active{display:flex;}
.leave-box{background:#0d0d0d;border:1px solid #222;border-radius:16px;padding:28px;max-width:300px;width:100%;display:flex;flex-direction:column;gap:16px;text-align:center;}
.leave-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:var(--red);}
.leave-box p{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;line-height:1.6;}
.leave-btns{display:flex;gap:10px;}

/* LEAVE BTN IN HUD */
#leaveBtn{background:rgba(255,45,32,0.08);color:var(--red);border:1px solid rgba(255,45,32,0.3);border-radius:6px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .15s;}
#leaveBtn:hover{background:rgba(255,45,32,0.18);}

/* TOAST */
#gtoast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111;border:1px solid #333;border-radius:10px;padding:12px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff;z-index:99999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
#gtoast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="gtoast"></div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-label" id="loadingLabel">creating room...</div>
</div>

<!-- MODE SELECT -->
<div class="screen active" id="modeScreen">
  <div class="logo-sm">RATHE</div>
  <div class="sub">guess the person</div>
  <div class="gap">
    <button class="btn btn-white" onclick="startCreate()">🎭 &nbsp;CREATE ROOM</button>
    <button class="btn btn-dark" onclick="showScreen('joinScreen')">🔑 &nbsp;JOIN WITH CODE</button>
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← BACK TO RATHE</button>
  </div>
</div>

<!-- JOIN SCREEN -->
<div class="screen" id="joinScreen">
  <div class="logo-sm">RATHE</div>
  <div class="sub">enter room code</div>
  <input class="code-input" id="codeInput" maxlength="6" placeholder="XXXXXX" oninput="this.value=this.value.toUpperCase()">
  <div class="gap">
    <button class="btn btn-white" onclick="joinRoom()">JOIN ROOM</button>
    <button class="btn btn-ghost" onclick="showScreen('modeScreen')">BACK</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="lobbyScreen">
  <div class="logo-sm">RATHE</div>
  <div class="sub" id="lobbySubText">waiting for players</div>
  <div class="room-code-display" id="lobbyCode">------</div>
  <div class="room-code-hint">share this code · 2–4 players</div>
  <div class="lobby-status">players: <span id="lobbyCountEl" style="color:#fff">1</span> / 4</div>
  <div class="player-list" id="playerListEl"></div>
  <div class="gap">
    <button class="btn btn-white" id="startGameBtn" style="opacity:0.3;pointer-events:none" onclick="hostStartGame()">START GAME</button>
    <button class="btn btn-ghost" onclick="leaveGame()">LEAVE</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="game-layout">
    <div class="cams-area" id="camsArea"></div>
    <div class="chat-area">
      <div class="chat-hud">
        <div class="hud-round" id="hudRound">ROUND 1 / 3</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="hud-turn" id="hudTurn">turn: <span id="hudTurnName">—</span></div>
          <button id="leaveBtn" onclick="showLeaveConfirm()">LEAVE</button>
        </div>
      </div>
      <div class="scores-bar" id="scoresBar"></div>
      <div id="charsPanel"></div>
      <div class="messages" id="messages"></div>
      <div class="guess-row" id="guessRow">
        <input id="guessInput" placeholder="type your guess..." autocomplete="off" onkeydown="if(event.key==='Enter')submitGuess()">
        <button id="guessBtn" onclick="submitGuess()">GUESS</button>
      </div>
    </div>
  </div>
</div>

<!-- ROUND END -->
<div id="roundOverlay">
  <div class="ro-title" id="roTitle">ROUND 1 OVER</div>
  <div class="ro-scores" id="roScores"></div>
  <button class="btn btn-white" style="max-width:280px;margin-top:8px" id="nextRoundBtn" onclick="hostNextRound()">NEXT ROUND</button>
  <button class="btn btn-ghost" style="max-width:280px" onclick="leaveGame()">LEAVE</button>
</div>

<!-- END -->
<div id="endOverlay">
  <div class="eo-title" id="eoTitle" style="color:var(--green)">GAME OVER</div>
  <div class="eo-winner" id="eoWinner"></div>
  <div class="ro-scores" id="eoScores" style="margin-top:16px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:8px;"></div>
  <button class="btn btn-white" style="max-width:280px;margin-top:16px" onclick="window.location.href='guess.html'">PLAY AGAIN</button>
  <button class="btn btn-ghost" style="max-width:280px" onclick="window.location.href='index.html'">BACK TO RATHE</button>
</div>

<!-- LEAVE CONFIRM -->
<div id="leaveConfirm">
  <div class="leave-box">
    <h3>LEAVE GAME?</h3>
    <p>you'll forfeit the round and your teammates will lose a player</p>
    <div class="leave-btns">
      <button class="btn btn-ghost" style="flex:1;padding:12px" onclick="hideLeaveConfirm()">STAY</button>
      <button class="btn" style="flex:1;padding:12px;background:var(--red);color:#fff" onclick="leaveGame()">LEAVE</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

const PERM_KEY='rathe_guess_perm_v1';

// Proactively re-acquire stream on page load if permission was previously granted.
// If the browser remembers permission this is instant and silent (no dialog).
// If not, it fails quietly — we'll ask again when the user clicks CREATE/JOIN.
(async()=>{
  if(localStorage.getItem(PERM_KEY)){
    try{
      localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
    }catch(e){ localStream=null; }
  }
})();

// Called before entering the lobby — ensures we have both audio and video.
async function ensureStream(){
  if(localStream&&localStream.active)return true;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true});
    localStorage.setItem(PERM_KEY,'1');
    return true;
  }catch(e){
    hideLoading();
    showToast('camera & mic access required');
    return false;
  }
}/* ── PEER INIT ── */
function initPeer(cb){
  if(peer&&!peer.destroyed&&myId){if(cb)cb();return;}
  if(peer){try{peer.destroy();}catch(e){}peer=null;myId=null;}
  peer=createPeer();
  peer.on('open',id=>{myId=id;if(cb)cb();});
  peer.on('error',err=>{
    console.error('peer error',err);
    if(['network','server-error','socket-error','socket-closed','disconnected'].includes(err.type)){
      showToast('reconnecting...');
      setTimeout(()=>initPeer(cb),2000);
    } else if(err.type==='peer-unavailable'){
      // stale peer ID — ignore
    } else {
      showToast('connection error: '+err.type);
    }
  });
  peer.on('disconnected',()=>{
    console.log('peer disconnected, reconnecting...');
    try{peer.reconnect();}catch(e){setTimeout(()=>initPeer(cb),1500);}
  });
  peer.on('call',handleIncomingCall);
}

function joinRoom(){
  const code=$('codeInput').value.trim().toUpperCase();
  if(code.length!==6){showToast('enter a 6-digit code');return;}
  gameId='guess_'+code;
  isHost=false;

      showScreen('lobbyScreen');

/* ── LOBBY ── */
function joinLobby(){
  const ref=db.ref(`guess_rooms/${gameId}/players`);
  ref.child(myId).set({peerId:myId,joinedAt:Date.now()});
  ref.child(myId).onDisconnect().remove();

  ref.on('value',snap=>{
    players={};
    const val=snap.val();
    if(val)Object.entries(val).forEach(([pid,p])=>{players[pid]=p;});
    renderLobby();
    if(gameLoaded&&Object.keys(players).length<2){
      showToast('everyone left — game over');
      setTimeout(leaveGame,2000);
    }
  });

  db.ref(`guess_rooms/${gameId}/state`).on('value',snap=>{
    const val=snap.val();
    if(!val)return;
    if(val.status==='started'&&!gameLoaded)loadGame(val);
  });
}

function renderLobby(){
  const pids=Object.keys(players);

  list.innerHTML='';
  for(let i=0;i<Math.max(2,pids.length);i++){
    const slot=document.createElement('div');

    }else{

    }
    list.appendChild(slot);
  }
  $('lobbyCountEl').innerText=pids.length;
  const btn=$('startGameBtn');
  if(isHost&&pids.length>=2&&pids.length<=4){
    btn.style.opacity='1';btn.style.pointerEvents='all';

}

function hostStartGame(){
  if(!isHost)return;
  const pids=Object.keys(players);
  if(pids.length<2||pids.length>4){showToast('need 2-4 players');return;}
  const shuffled=[...pids].sort(()=>Math.random()-.5);
  const nums={},chars={},scores={};
  const charPool=[...Array(CHARACTERS.length).keys()].sort(()=>Math.random()-.5);
  shuffled.forEach((pid,i)=>{
    nums[pid]=i+1;
    chars[pid]=charPool[i];
    scores[pid]=0;
  });
  // Clear any leftover chat before game starts
  db.ref(`guess_rooms/${gameId}/chat`).remove();
  db.ref(`guess_rooms/${gameId}/state`).set({
    status:'started',round:1,turnNum:1,
    playerNums:nums,chars,scores,guessed:{},roundCorrect:0
  });
}

/* ── LOAD GAME ── */
async function loadGame(state){
  if(gameLoaded)return;
  gameLoaded=true;
  const pids=Object.keys(players);
  myNum=state.playerNums[myId];
  myChar=CHARACTERS[state.chars[myId]];
  buildCharsPanel(state);
  currentRound=state.round||1;
  currentTurnNum=state.turnNum||1;
  // localStream already acquired in startCreate/joinRoom — no second dialog
  if(!localStream||!localStream.active){
    try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true}); }
    catch(e){ showToast('camera/mic needed'); }
  }
  showScreen('gameScreen');
  buildCams(state);
  renderScores(state);
  updateTurnUI(state);
  // peer is guaranteed to have myId by this point since initPeer was called first
  connectMesh(pids,state);

  let lastRound=state.round||1;
  db.ref(`guess_rooms/${gameId}/state`).on('value',snap=>{
    const s=snap.val();if(!s)return;
    currentRound=s.round||1;
    currentTurnNum=s.turnNum||1;
    renderScores(s);
    updateTurnUI(s);
    if(s.guessed){
      Object.entries(s.guessed).forEach(([pid,g])=>{
        if(g){
          const slot=document.querySelector(`.cam-slot[data-pid="${pid}"]`);
          if(slot)slot.classList.add('guessed');
        }
      });
    }
    if(s.status==='round_end')showRoundEnd(s);
    if(s.status==='game_end')showGameEnd(s);
    if(s.status==='started'&&(s.round||1)>lastRound){
      lastRound=s.round;
      myChar=CHARACTERS[s.chars[myId]];
      hideRoundOverlay();
      $('messages').innerHTML='';
      buildCams(s);
      buildCharsPanel(s);
      // Re-attach all existing peer streams to the freshly rebuilt video elements.
      // buildCams wipes the DOM so new <video> elements are blank — we pull live
      // tracks directly from each PeerConnection's receivers and re-attach them.
      reattachStreams();
    }
    lastRound=Math.max(lastRound,s.round||1);
  });

  // Plain child_added — no startAt/orderByChild.
  // startAt(Date.now()) breaks when clients have different system clocks:
  // a client whose clock is slightly ahead filters out messages from others.
  // We clear chat in hostStartGame so no stale messages bleed across games.
  db.ref(`guess_rooms/${gameId}/chat`).on('child_added',snap=>{
    const msg=snap.val();
    if(msg)appendMessage(msg);
  });
}

/* ── RE-ATTACH STREAMS AFTER DOM REBUILD ── */
// After buildCams() rebuilds all <video> elements, the live peer tracks still exist
// inside each RTCPeerConnection. We pull them from getReceivers() and re-attach.
function reattachStreams(){
  // Re-attach local stream to the rebuilt local slot
  if(localStream&&localStream.active){
    const myVid=document.querySelector(`.cam-slot[data-pid="${myId}"] video`);
    if(myVid){myVid.srcObject=localStream;playVideo(myVid,true);}
  }
  // Re-attach remote streams from live RTCPeerConnection receivers
  Object.entries(connections).forEach(([pid,conn])=>{
    if(!conn.call)return;
    const pc=conn.call.peerConnection;
    if(!pc)return;
    const liveTracks=pc.getReceivers()
      .map(r=>r.track)
      .filter(t=>t&&t.readyState==='live');
    if(liveTracks.length){
      liveTracks.forEach(t=>attachTrackToSlot(pid,t));
    }else if(remoteStreams[pid]){
      // Fallback: use cached stream if receivers aren't populated yet
      attachStream(pid,remoteStreams[pid]);
    }
  });
}

/* ── VIDEO PLAYBACK ── */
// isLocal: keep muted (prevents echo). Remote: unmute after successful play.
function playVideo(vid, isLocal){
  if(!vid.srcObject)return;
  const hasVideoTracks=vid.srcObject.getVideoTracks&&vid.srcObject.getVideoTracks().length>0;
  vid.muted=true; // always start muted so autoplay is guaranteed
  vid.play().then(()=>{
    if(!isLocal)vid.muted=false; // unmute remote streams for audio
    if(hasVideoTracks)vid.classList.add('live');
  }).catch(e=>{
    console.warn('play failed, retrying',e);
    setTimeout(()=>playVideo(vid,isLocal),600);
  });
}

/* ── MESH ── */
function connectMesh(pids,state){
  // Higher peer ID calls lower peer ID — one call per pair, no duplicates
  pids.forEach(pid=>{
    if(pid===myId)return;
    if(myId>pid){
      // I have the higher ID — I initiate the call
      let attempts=0;
      const tryCall=setInterval(()=>{
        attempts++;
        if(attempts>30){clearInterval(tryCall);console.warn('gave up calling',pid);return;}
        if(!localStream)return;
        clearInterval(tryCall);
        const delay=(state.playerNums[myId]||1)*300;
        setTimeout(()=>setupOutgoingCall(pid),delay);
      },500);
    }
    // lower ID waits for handleIncomingCall
  });
}

function setupOutgoingCall(pid){
  if(connections[pid]&&connections[pid].call)return; // already have a call
  const call=peer.call(pid,localStream);
  connections[pid]=connections[pid]||{};
  connections[pid].call=call;
  setupCallHandlers(pid,call);
}

function setupCallHandlers(pid,call){
  // PeerJS stream event (legacy fallback)
  call.on('stream',stream=>attachStream(pid,stream));

  // Wait for RTCPeerConnection, then use track events (more reliable)
  const waitForPc=setInterval(()=>{
    const pc=call.peerConnection;if(!pc)return;
    clearInterval(waitForPc);

    pc.addEventListener('track',e=>{
      if(e.streams&&e.streams[0]){
        attachStream(pid,e.streams[0]);
      }else{
        attachTrackToSlot(pid,e.track);
      }
    });

    pc.addEventListener('iceconnectionstatechange',()=>{
      if(pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed'){
        pc.getReceivers().forEach(r=>{
          if(r.track&&r.track.readyState==='live')attachTrackToSlot(pid,r.track);
        });
      }
    });

    // Polling fallback for delayed tracks (mobile cameras)
    const pollTracks=setInterval(()=>{
      const slot=document.querySelector(`.cam-slot[data-pid="${pid}"]`);
      if(!slot){clearInterval(pollTracks);return;}
      const vid=slot.querySelector('video');
      if(vid&&vid.classList.contains('live')){clearInterval(pollTracks);return;}
      pc.getReceivers().forEach(r=>{
        if(r.track&&r.track.readyState==='live')attachTrackToSlot(pid,r.track);
      });
    },1000);
  },50);

  call.on('close',()=>console.log('call closed with',pid));
  call.on('error',e=>console.warn('call error',pid,e));
}

function handleIncomingCall(call){
  const pid=call.peer;
  // Reject duplicate calls — one active call per peer is enough
  if(connections[pid]&&connections[pid].call){
    console.log('duplicate call from',pid,'— closing');
    call.close();
    return;
  }
  connections[pid]=connections[pid]||{};
  connections[pid].call=call;
  if(localStream){
    call.answer(localStream);
  }else{
    // answer now with empty stream; replace tracks once stream is ready
    call.answer(new MediaStream());
    let tries=0;
    const wait=setInterval(()=>{
      tries++;
      if(tries>40){clearInterval(wait);return;}
      if(!localStream)return;
      clearInterval(wait);
      const pc=call.peerConnection;if(!pc)return;
      localStream.getTracks().forEach(t=>{
        const sender=pc.getSenders().find(s=>s.track&&s.track.kind===t.kind);
        if(sender)sender.replaceTrack(t).catch(e=>console.warn('replaceTrack',e));
        else pc.addTrack(t,localStream);
      });
    },500);
  }
  setupCallHandlers(pid,call);
}

function attachTrackToSlot(pid,track){
  if(!track||track.readyState==='ended')return;
  const slot=document.querySelector(`.cam-slot[data-pid="${pid}"]`);
  if(!slot)return;
  const vid=slot.querySelector('video');
  if(!vid)return;
  let rs=vid.srcObject;
  if(!rs||!(rs instanceof MediaStream)){rs=new MediaStream();vid.srcObject=rs;}
  if(rs.getTracks().find(t=>t.id===track.id))return; // already present
  rs.addTrack(track);
  // Remote slots: not local, so unmute after play
  playVideo(vid,false);
}

function attachStream(pid,stream){
  if(!stream)return;
  remoteStreams[pid]=stream; // cache for round re-attachment
  const slot=document.querySelector(`.cam-slot[data-pid="${pid}"]`);
  if(!slot)return;
  const vid=slot.querySelector('video');
  if(!vid)return;
  stream.getTracks().forEach(track=>{
    let rs=vid.srcObject;
    if(!rs||!(rs instanceof MediaStream)){rs=new MediaStream();vid.srcObject=rs;}
    if(!rs.getTracks().find(t=>t.id===track.id))rs.addTrack(track);
  });
  playVideo(vid,false);
}

/* ── TURN UI ── */
function updateTurnUI(state){
  const turnNum=state.turnNum||1;
  const turnPid=Object.keys(state.playerNums||{}).find(p=>state.playerNums[p]===turnNum);
  const isMyTurn=turnPid===myId;
  $('hudRound').innerText=`ROUND ${state.round||1} / 3`;
  $('hudTurnName').innerText=isMyTurn?'YOUR TURN':'player #'+turnNum;
  document.querySelectorAll('.player-num').forEach(el=>{
    const pid=el.id.replace('playerNum_','');
    el.classList.toggle('active-turn',pid===turnPid);
  });
  const guessRow=$('guessRow');
  guessRow.style.display=(isMyTurn&&!state.guessed?.[myId])?'flex':'none';
}

/* ── SCORES ── */
function renderScores(state){
  const bar=$('scoresBar');
  bar.innerHTML='';
  if(!state.playerNums)return;
  const sorted=Object.keys(state.playerNums).sort((a,b)=>state.playerNums[a]-state.playerNums[b]);
  sorted.forEach(pid=>{
    const chip=document.createElement('div');
    chip.className='score-chip'+(pid===myId?' me':'');
    const pts=state.scores?.[pid]||0;
    chip.innerHTML=`<span>#${state.playerNums[pid]}</span><span class="pts">${pts}</span>`;
    bar.appendChild(chip);
  });
}

/* ── CHAT ── */
function appendMessage(msg){
  const box=$('messages');
  const div=document.createElement('div');
  div.className='msg';
  const isMe=msg.pid===myId;
  const isSystem=msg.type==='system';
  const isCorrect=msg.type==='correct';
  if(isSystem||isCorrect){
    div.innerHTML=`<div class="msg-bubble ${isCorrect?'correct':'system'}">${msg.text}</div>`;
  }else{
    const bubbleClass='msg-bubble'+(isMe?' me-bubble':'');
    div.innerHTML=`
      <div class="msg-meta ${isMe?'me-meta':''}">#${msg.num} ${isMe?'(you)':''}</div>
      <div class="${bubbleClass}">${msg.text}</div>`;
  }
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function pushMsg(text,type='chat'){
  db.ref(`guess_rooms/${gameId}/chat`).push({
    pid:myId,num:myNum||'?',text,type,ts:Date.now()
  });
}

function submitGuess(){
  const input=$('guessInput');
  const text=input.value.trim();
  if(!text)return;
  db.ref(`guess_rooms/${gameId}/state`).once('value').then(snap=>{
    const s=snap.val();if(!s)return;
    const turnPid=Object.keys(s.playerNums||{}).find(p=>s.playerNums[p]===s.turnNum);
    if(turnPid!==myId){showToast("it's not your turn");return;}
    if(s.guessed?.[myId]){showToast('you already guessed');return;}
    const correct=text.trim().toLowerCase()===myChar.name.toLowerCase();
    pushMsg(`GUESS: ${text}${correct?' ✓':' ✗'}`,correct?'correct':'chat');
    if(correct){
      const roundCorrectNow=(s.roundCorrect||0)+1;
      const pts=roundCorrectNow===1?3:roundCorrectNow===2?2:1;
      const updates={};
      updates[`guessed/${myId}`]=true;
      updates[`scores/${myId}`]=(s.scores?.[myId]||0)+pts;
      updates['roundCorrect']=roundCorrectNow;
      db.ref(`guess_rooms/${gameId}/chat`).push({
        pid:'system',num:0,
        text:`🎉 Player #${myNum} guessed correctly! (+${pts} pts)`,
        type:'correct',ts:Date.now()
      });
      const totalPlayers=Object.keys(s.playerNums||{}).length;
      const roundOver=roundCorrectNow>=2||(roundCorrectNow>=totalPlayers-1);
      if(roundOver){
        const alreadyGuessed={...s.guessed||{},[myId]:true};
        const remaining=Object.keys(s.playerNums||{}).filter(p=>!alreadyGuessed[p]);
        remaining.forEach(p=>{updates[`scores/${p}`]=(s.scores?.[p]||0)+1;});
        updates['status']=s.round>=3?'game_end':'round_end';
      }else{
        // advance to next non-guessed player
        const total=Object.keys(s.playerNums||{}).length;
        let next=s.turnNum;
        for(let i=0;i<total;i++){
          next=(next%total)+1;
          const nextPid=Object.keys(s.playerNums).find(p=>s.playerNums[p]===next);
          if(!s.guessed?.[nextPid]&&nextPid!==myId)break;
        }
        updates['turnNum']=next;
      }
      db.ref(`guess_rooms/${gameId}/state`).update(updates);
    }
    input.value='';
  });
}

/* ── ROUND OVERLAY HELPERS ── */
function showRoundOverlay(){$('roundOverlay').classList.add('active');}
function hideRoundOverlay(){$('roundOverlay').classList.remove('active');}

/* ── ROUND END ── */
function showRoundEnd(state){
  $('roTitle').innerText=`ROUND ${state.round} OVER`;
  const scoresEl=$('roScores');
  scoresEl.innerHTML='';
  const sorted=Object.keys(state.playerNums||{}).sort((a,b)=>(state.scores?.[b]||0)-(state.scores?.[a]||0));
  sorted.forEach(pid=>{
    const row=document.createElement('div');
    row.className='ro-score-row';
    row.innerHTML=`<span class="ro-score-name">${pid===myId?'you':'player #'+state.playerNums[pid]}</span><span class="ro-score-pts">${state.scores?.[pid]||0} pts</span>`;
    scoresEl.appendChild(row);
  });
  $('nextRoundBtn').style.display=(isHost&&state.round<3)?'block':'none';
  showRoundOverlay();
}

function hostNextRound(){
  if(!isHost)return;
  db.ref(`guess_rooms/${gameId}/state`).once('value').then(snap=>{
    const s=snap.val();if(!s)return;
    const pids=Object.keys(s.playerNums||{});
    const charPool=[...Array(CHARACTERS.length).keys()].sort(()=>Math.random()-.5);
    const chars={};
    pids.forEach((pid,i)=>{chars[pid]=charPool[i];});
    db.ref(`guess_rooms/${gameId}/state`).update({
      status:'started',
      round:(s.round||1)+1,
      turnNum:1,chars,guessed:{},roundCorrect:0
    });
    db.ref(`guess_rooms/${gameId}/chat`).remove();
  });
}

/* ── GAME END ── */
function showGameEnd(state){
  hideRoundOverlay();
  const sorted=Object.keys(state.playerNums||{}).sort((a,b)=>(state.scores?.[b]||0)-(state.scores?.[a]||0));
  const winnerPid=sorted[0];
  const isWinner=winnerPid===myId;
  $('eoTitle').innerText=isWinner?'YOU WIN!':'GAME OVER';
  $('eoTitle').style.color=isWinner?'var(--green)':'var(--red)';
  $('eoWinner').innerText=isWinner?'you had the most points':`player #${state.playerNums?.[winnerPid]} wins`;
  const scoresEl=$('eoScores');
  scoresEl.innerHTML='';
  sorted.forEach(pid=>{
    const row=document.createElement('div');
    row.className='ro-score-row';
    row.innerHTML=`<span class="ro-score-name">${pid===myId?'you':'player #'+state.playerNums[pid]}</span><span class="ro-score-pts">${state.scores?.[pid]||0} pts</span>`;
    scoresEl.appendChild(row);
  });
  $('endOverlay').style.display='flex';
}

/* ── LEAVE ── */
function showLeaveConfirm(){$('leaveConfirm').classList.add('active');}
function hideLeaveConfirm(){$('leaveConfirm').classList.remove('active');}
function leaveGame(){
  gameLoaded=false;
  if(gameId&&myId)db.ref(`guess_rooms/${gameId}/players/${myId}`).remove();
  if(localStream)localStream.getTracks().forEach(t=>t.stop());
  if(peer)try{peer.destroy();}catch(e){}
  window.location.href='index.html';
}
</script>
